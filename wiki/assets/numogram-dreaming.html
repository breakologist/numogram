<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Numogram Dreaming</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050508; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    canvas { box-shadow: 0 0 80px rgba(80,40,120,0.15); }
  </style>
</head>
<body>
<script>
// ═══════════════════════════════════════════════════════════════════════
// THE NUMOGRAM DREAMING — zones as living portals, currents as breath
// Inspired by: rotational-symmetry.md, triangular-numbers.md, gates-and-plexing.md
// ═══════════════════════════════════════════════════════════════════════

const W = 1000, H = 900;

// Zone data: position, color, region, radius
const ZD = [
  {id:0, x:800, y:580, c:[68,68,68],   r:75, name:"Void",        region:"plex"},
  {id:1, x:600, y:220, c:[255,215,0], r:75, name:"Stability",   region:"torque"},
  {id:2, x:500, y:400, c:[255,140,0], r:75, name:"Separation",  region:"torque"},
  {id:3, x:400, y:580, c:[255,0,255], r:75, name:"Release",     region:"warp"},
  {id:4, x:600, y:580, c:[0,255,255], r:75, name:"Catastrophe", region:"torque"},
  {id:5, x:700, y:400, c:[0,255,0],   r:75, name:"Pressure",    region:"torque"},
  {id:6, x:200, y:580, c:[0,128,255], r:75, name:"Abstraction", region:"warp"},
  {id:7, x:300, y:400, c:[255,51,51], r:75, name:"Blood",       region:"torque"},
  {id:8, x:400, y:220, c:[192,160,255],r:75, name:"Multiplicity",region:"torque"},
  {id:9, x:500, y:60,  c:[153,0,255], r:75, name:"Iron Core",   region:"plex"},
];

// Syzygy currents: which zones connect, current value, color
const CURRENTS = [
  {a:1, b:8, val:7, name:"Surge",  c:[255,215,0]},   // 1::8 → Surge (7)
  {a:2, b:7, val:5, name:"Hold",   c:[255,140,0]},   // 2::7 → Hold (5)
  {a:4, b:5, val:1, name:"Sink",   c:[0,255,255]},   // 4::5 → Sink (1)
  {a:3, b:6, val:3, name:"Warp",   c:[255,0,255]},   // 3::6 → Warp (3)
  {a:0, b:9, val:9, name:"Plex",   c:[153,0,255]},   // 0::9 → Plex (9)
];

// Time-Circuit sequence (anticlockwise rotor)
const TC = [1, 8, 2, 7, 5, 4];

let particles = [];
let tcPulse = 0;
let plexPhase = 0;
let rotSwap = 0;  // 6↔9 rotational swap timer

function setup() {
  createCanvas(W, H);
  colorMode(RGB, 255, 255, 255, 255);
  textFont('Courier New');
  
  // Seed current particles
  for (let i = 0; i < 120; i++) {
    spawnParticle();
  }
}

function draw() {
  // Deep trail background
  background(5, 5, 8, 35);
  
  // Global time
  let t = frameCount;
  tcPulse = (t * 0.008) % TWO_PI;
  plexPhase = sin(t * 0.003);
  
  // Rotational swap: every 900 frames (~15s), 6 and 9 visually invert for 120 frames
  let swapActive = (t % 900 < 120);
  rotSwap = lerp(rotSwap, swapActive ? 1 : 0, 0.05);
  
  // Draw connections (currents) behind zones
  drawCurrents(t);
  
  // Draw Time-Circuit glow ring
  drawTimeCircuitRing(t);
  
  // Draw zones
  for (let z of ZD) {
    push();
    drawZone(z, t, rotSwap);
    pop();
  }
  
  // Draw current particles
  drawCurrentParticles(t);
  
  // Plexing wave overlay
  drawPlexingWave(t);
  
  // Title / overlay
  drawOverlay(t);
}

// ═══════════════════════════════════════════════════════════════════════
// ZONE RENDERERS — expanded from tsubuyaki vocabulary, no char limit
// ═══════════════════════════════════════════════════════════════════════

function drawZone(z, t, rotSwap) {
  let x = z.x, y = z.y, r = z.r;
  let c = z.c.slice();
  
  // Rotational swap: 6 and 9 invert colors/position slightly
  if ((z.id === 6 || z.id === 9) && rotSwap > 0.01) {
    let other = ZD.find(zz => zz.id === (z.id === 6 ? 9 : 6));
    x = lerp(x, other.x, rotSwap * 0.15);
    y = lerp(y, other.y, rotSwap * 0.15);
    // Tint toward the other's color
    c[0] = lerp(c[0], other.c[0], rotSwap * 0.3);
    c[1] = lerp(c[1], other.c[1], rotSwap * 0.3);
    c[2] = lerp(c[2], other.c[2], rotSwap * 0.3);
  }
  
  // Zone background glow
  noStroke();
  for (let g = 3; g > 0; g--) {
    fill(c[0], c[1], c[2], 8 * g);
    ellipse(x, y, r * 2.2 + g * 15);
  }
  
  // Zone rim
  stroke(c[0], c[1], c[2], 40);
  strokeWeight(1.5);
  noFill();
  ellipse(x, y, r * 2);
  
  // Clip to zone circle
  drawingContext.save();
  drawingContext.beginPath();
  drawingContext.arc(x, y, r, 0, TWO_PI);
  drawingContext.clip();
  
  // Dispatch to zone-specific renderer
  translate(x, y);
  switch(z.id) {
    case 0: drawVoid(t); break;
    case 1: drawStability(t); break;
    case 2: drawSeparation(t); break;
    case 3: drawRelease(t); break;
    case 4: drawCatastrophe(t); break;
    case 5: drawPressure(t); break;
    case 6: drawAbstraction(t); break;
    case 7: drawBlood(t); break;
    case 8: drawMultiplicity(t); break;
    case 9: drawIronCore(t); break;
  }
  
  drawingContext.restore();
  
  // Zone label
  noStroke();
  fill(c[0], c[1], c[2], 120);
  textAlign(CENTER, CENTER);
  textSize(14);
  text(z.id, x, y - r - 14);
  fill(c[0], c[1], c[2], 60);
  textSize(9);
  text(z.name.toUpperCase(), x, y + r + 12);
}

// ── Zone 0: Void ──
function drawVoid(t) {
  noStroke();
  for (let n = 0; n < 20; n++) {
    let a = n * 0.7 + t * 0.003;
    let rr = 30 + noise(n, t * 0.002) * 45;
    fill(44, 20 + noise(n, t * 0.01) * 20);
    ellipse(cos(a) * rr, sin(a * 0.6) * rr, 3 + noise(n) * 4);
  }
  // Occasional spark
  if (random() < 0.03) {
    fill(80, 40);
    ellipse(random(-60, 60), random(-60, 60), random(2, 6));
  }
}

// ── Zone 1: Stability ──
function drawStability(t) {
  stroke(255, 215, 0, 50);
  strokeWeight(1);
  for (let gx = -50; gx <= 50; gx += 25) {
    for (let gy = -50; gy <= 50; gy += 25) {
      let d = noise(gx * 0.1, gy * 0.1, t * 0.005) * 8;
      // Horizontal connections
      if (gx < 50) {
        stroke(255, 215, 0, 20);
        line(gx + d, gy + d, gx + 25 + d, gy + d);
      }
      // Vertical connections
      if (gy < 50) {
        stroke(255, 215, 0, 20);
        line(gx + d, gy + d, gx + d, gy + 25 + d);
      }
      // Node
      noStroke();
      fill(255, 215, 0, 90);
      ellipse(gx + d, gy + d, 5);
    }
  }
}

// ── Zone 2: Separation ──
function drawSeparation(t) {
  noStroke();
  for (let n = 0; n < 60; n++) {
    let tt = n / 60;
    let d = tt * 60 * abs(sin(tt * PI + t * 0.005));
    let alpha = 30 + tt * 50;
    fill(255, 140, 0, alpha);
    ellipse(d, (tt - 0.5) * 120, 4);
    fill(255, 140, 0, alpha * 0.5);
    ellipse(-d, (tt - 0.5) * 120, 4);
  }
}

// ── Zone 3: Release ──
function drawRelease(t) {
  noStroke();
  for (let n = 0; n < 250; n++) {
    let a = n / 250 * TWO_PI + t * 0.015;
    let rr = 20 + noise(n * 0.05, t * 0.003) * 60;
    fill(255, 0, 255, 18);
    ellipse(cos(a) * rr, sin(a) * rr, 4 + noise(n) * 4);
  }
}

// ── Zone 4: Catastrophe ──
function drawCatastrophe(t) {
  noFill();
  stroke(0, 255, 255, 60);
  strokeWeight(1.5);
  // Displaced grid
  for (let n = 0; n < 25; n++) {
    let gx = (n % 5) * 30 - 60;
    let gy = floor(n / 5) * 30 - 60;
    let d = noise(gx * 0.1, gy * 0.1, t * 0.02) * 20;
    rect(gx + d - 6, gy + d - 6, 12, 12);
  }
  // Ripple flash
  let rip = (t * 3) % 100;
  noFill();
  stroke(0, 255, 255, 80 - rip * 0.8);
  ellipse(0, 0, rip * 2);
}

// ── Zone 5: Pressure ──
function drawPressure(t) {
  noStroke();
  for (let ring = 0; ring < 3; ring++) {
    let baseR = 25 + ring * 20;
    let breathe = sin(t * 0.02 + ring * 1.5) * 12;
    let r = baseR + breathe;
    for (let i = 0; i < 50; i++) {
      let a = i / 50 * TWO_PI;
      fill(0, 255, 0, 12 + ring * 4);
      ellipse(cos(a) * r, sin(a) * r, 3);
    }
  }
}

// ── Zone 6: Abstraction ──
function drawAbstraction(t) {
  for (let n = 0; n < 12; n++) {
    let a = n * TWO_PI / 12 + t * 0.003;
    let x = cos(a) * 45;
    let y = sin(a) * 45;
    // Connection to next
    let b = ((n + 1) % 12) * TWO_PI / 12 + t * 0.003;
    stroke(0, 128, 255, 25);
    strokeWeight(1);
    line(x, y, cos(b) * 45, sin(b) * 45);
    // Circle
    noStroke();
    fill(0, 128, 255, 30);
    ellipse(x, y, 22);
  }
  // Central hexagram hint
  noFill();
  stroke(0, 128, 255, 20);
  strokeWeight(1);
  for (let n = 0; n < 6; n++) {
    let a = n * TWO_PI / 6 + t * 0.005;
    line(0, 0, cos(a) * 25, sin(a) * 25);
  }
}

// ── Zone 7: Blood ──
function drawBlood(t) {
  noStroke();
  for (let n = 0; n < 120; n++) {
    let rr = 25 + noise(n, t * 0.008) * 50;
    let a = n * 0.4 + t * 0.008;
    // Elliptical squeeze
    fill(255, 33, 33, 14);
    ellipse(cos(a) * rr * 0.7, sin(a) * rr, 4 + noise(n) * 3);
  }
  // Pulse ring
  let pulse = sin(t * 0.03) * 0.5 + 0.5;
  noFill();
  stroke(255, 33, 33, 30 * pulse);
  strokeWeight(2);
  ellipse(0, 0, 40 + pulse * 30, 55 + pulse * 30);
}

// ── Zone 8: Multiplicity ──
function drawMultiplicity(t) {
  noStroke();
  for (let n = 0; n < 80; n++) {
    let mode = n % 3;
    let tt = n / 80;
    let baseA = tt * TWO_PI * (mode + 1) + t * (0.008 + mode * 0.004);
    let baseR = 30 + mode * 15;
    let nx = noise(n, t * 0.003) * 25;
    let ny = noise(n + 50, t * 0.003) * 25;
    fill(192 - mode * 15, 160 + mode * 10, 255, 20 + mode * 5);
    ellipse(cos(baseA) * baseR + nx, sin(baseA) * baseR + ny, 4 + mode);
  }
}

// ── Zone 9: Iron Core ──
function drawIronCore(t) {
  noStroke();
  for (let n = 0; n < 200; n++) {
    let a = n * 0.15 + t * 0.012;
    let rr = noise(n * 0.1, t * 0.005) * 65;
    // Density increases toward center
    let density = map(rr, 0, 65, 1, 0.3);
    fill(153, 0, 255, 16 * density);
    ellipse(cos(a) * rr, sin(a) * rr, 3 + density * 4);
  }
  // Core singularity
  fill(200, 150, 255, 30 + sin(t * 0.05) * 15);
  ellipse(0, 0, 12 + sin(t * 0.03) * 4);
}

// ═══════════════════════════════════════════════════════════════════════
// CURRENTS — energy bridges between syzygetic pairs
// ═══════════════════════════════════════════════════════════════════════

function drawCurrents(t) {
  for (let cur of CURRENTS) {
    let za = ZD.find(z => z.id === cur.a);
    let zb = ZD.find(z => z.id === cur.b);
    if (!za || !zb) continue;
    
    let c = cur.c;
    let mx = (za.x + zb.x) / 2;
    let my = (za.y + zb.y) / 2;
    
    // Control point for curve — offset perpendicular to create arc
    let dx = zb.x - za.x;
    let dy = zb.y - za.y;
    let perpX = -dy * 0.25;
    let perpY = dx * 0.25;
    
    // Warp and Plex get tighter curves
    if (cur.name === "Warp") { perpX *= 0.3; perpY *= 0.3; }
    if (cur.name === "Plex") { perpX *= 0.6; perpY *= 0.6; }
    
    let cx = mx + perpX;
    let cy = my + perpY;
    
    // Draw faint curve
    noFill();
    stroke(c[0], c[1], c[2], 18);
    strokeWeight(1);
    beginShape();
    vertex(za.x, za.y);
    quadraticVertex(cx, cy, zb.x, zb.y);
    endShape();
    
    // Draw flowing dots
    let nDots = cur.val * 2; // current value determines particle density
    for (let i = 0; i < nDots; i++) {
      let tt = ((t * 0.002 * cur.val) + i / nDots) % 1;
      // Quadratic bezier interpolation
      let ax = lerp(za.x, cx, tt);
      let ay = lerp(za.y, cy, tt);
      let bx = lerp(cx, zb.x, tt);
      let by = lerp(cy, zb.y, tt);
      let px = lerp(ax, bx, tt);
      let py = lerp(ay, by, tt);
      
      let alpha = 60 * sin(tt * PI);
      noStroke();
      fill(c[0], c[1], c[2], alpha);
      ellipse(px, py, 3);
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════
// TIME-CIRCUIT RING — the anticlockwise rotor glow
// ═══════════════════════════════════════════════════════════════════════

function drawTimeCircuitRing(t) {
  // Connect Time-Circuit zones in sequence with a faint traveling glow
  for (let i = 0; i < TC.length; i++) {
    let z1 = ZD.find(z => z.id === TC[i]);
    let z2 = ZD.find(z => z.id === TC[(i + 1) % TC.length]);
    if (!z1 || !z2) continue;
    
    let pulse = sin(t * 0.008 + i * 1.0) * 0.5 + 0.5;
    stroke(200, 180, 100, 12 + pulse * 15);
    strokeWeight(2 + pulse * 2);
    
    // Dashed line effect
    let dx = z2.x - z1.x;
    let dy = z2.y - z1.y;
    let dist = sqrt(dx*dx + dy*dy);
    let steps = dist / 15;
    for (let s = 0; s < steps; s++) {
      let tt = s / steps;
      if ((s + floor(t * 0.05)) % 3 !== 0) continue; // dash pattern
      let px = lerp(z1.x, z2.x, tt);
      let py = lerp(z1.y, z2.y, tt);
      point(px, py);
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════
// CURRENT PARTICLES — free-floating energy between zones
// ═══════════════════════════════════════════════════════════════════════

function spawnParticle() {
  let cur = random(CURRENTS);
  let za = ZD.find(z => z.id === cur.a);
  let zb = ZD.find(z => z.id === cur.b);
  particles.push({
    cur: cur,
    tt: random(),
    speed: 0.002 + random() * 0.004,
    size: 2 + random() * 3,
  });
}

function drawCurrentParticles(t) {
  // Maintain particle count
  while (particles.length < 120) spawnParticle();
  
  for (let p of particles) {
    p.tt += p.speed;
    if (p.tt > 1) {
      p.tt = 0;
      p.cur = random(CURRENTS);
    }
    
    let za = ZD.find(z => z.id === p.cur.a);
    let zb = ZD.find(z => z.id === p.cur.b);
    let mx = (za.x + zb.x) / 2;
    let my = (za.y + zb.y) / 2;
    let dx = zb.x - za.x;
    let dy = zb.y - za.y;
    let perpX = -dy * 0.25;
    let perpY = dx * 0.25;
    if (p.cur.name === "Warp") { perpX *= 0.3; perpY *= 0.3; }
    if (p.cur.name === "Plex") { perpX *= 0.6; perpY *= 0.6; }
    
    let cx = mx + perpX;
    let cy = my + perpY;
    
    let ax = lerp(za.x, cx, p.tt);
    let ay = lerp(za.y, cy, p.tt);
    let bx = lerp(cx, zb.x, p.tt);
    let by = lerp(cy, zb.y, p.tt);
    let px = lerp(ax, bx, p.tt);
    let py = lerp(ay, by, p.tt);
    
    let alpha = 100 * sin(p.tt * PI);
    noStroke();
    fill(p.cur.c[0], p.cur.c[1], p.cur.c[2], alpha);
    ellipse(px, py, p.size);
  }
}

// ═══════════════════════════════════════════════════════════════════════
// PLEXING WAVE — cumulation folds back to digital root
// Inspired by gates-and-plexing.md: Gt-36, Gt-45 as terminal plunges
// ═══════════════════════════════════════════════════════════════════════

function drawPlexingWave(t) {
  let cycle = 800; // ~13 seconds
  let phase = t % cycle;
  
  if (phase < 120) {
    let progress = phase / 120; // 0→1
    let waveY = lerp(650, 50, progress);
    
    // Horizontal wave line
    noFill();
    stroke(255, 255, 255, 30 * (1 - progress));
    strokeWeight(2);
    line(0, waveY, W, waveY);
    
    // Flash zones as wave passes
    for (let z of ZD) {
      let dist = abs(z.y - waveY);
      if (dist < 60) {
        let flash = (1 - dist / 60) * 40;
        noStroke();
        fill(255, 255, 255, flash);
        ellipse(z.x, z.y, z.r * 2.2);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════
// OVERLAY — title, mouse interaction
// ═══════════════════════════════════════════════════════════════════════

function drawOverlay(t) {
  noStroke();
  fill(80, 70, 100, 40);
  textAlign(LEFT, TOP);
  textSize(11);
  text("THE NUMOGRAM DREAMING", 20, 20);
  fill(80, 70, 100, 25);
  textSize(9);
  text("cumulation → plexing → gate", 20, 36);
  
  // Mouse hover: show zone info
  for (let z of ZD) {
    let d = dist(mouseX, mouseY, z.x, z.y);
    if (d < z.r) {
      // Find syzygy partner
      let partner = null;
      let current = null;
      for (let cur of CURRENTS) {
        if (cur.a === z.id) { partner = cur.b; current = cur; }
        if (cur.b === z.id) { partner = cur.a; current = cur; }
      }
      
      fill(10, 10, 14, 200);
      stroke(z.c[0], z.c[1], z.c[2], 100);
      strokeWeight(1);
      rect(mouseX + 15, mouseY - 10, 180, 55, 4);
      
      noStroke();
      fill(z.c[0], z.c[1], z.c[2], 200);
      textAlign(LEFT, TOP);
      textSize(12);
      text(`ZONE ${z.id} — ${z.name.toUpperCase()}`, mouseX + 22, mouseY - 4);
      fill(150, 140, 160, 180);
      textSize(10);
      text(`region: ${z.region}`, mouseX + 22, mouseY + 12);
      if (current) {
        text(`syzygy: ${z.id}::${partner}  current: ${current.name} (${current.val})`, mouseX + 22, mouseY + 26);
      }
    }
  }
}

// Click to spawn burst
function mousePressed() {
  for (let z of ZD) {
    let d = dist(mouseX, mouseY, z.x, z.y);
    if (d < z.r) {
      // Spawn 20 particles on currents connected to this zone
      for (let i = 0; i < 20; i++) {
        let relevant = CURRENTS.filter(c => c.a === z.id || c.b === z.id);
        let cur = random(relevant.length > 0 ? relevant : CURRENTS);
        particles.push({
          cur: cur,
          tt: random(),
          speed: 0.005 + random() * 0.01,
          size: 3 + random() * 4,
        });
      }
    }
  }
}
</script>
</body>
</html>
