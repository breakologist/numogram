<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Numogram Tsubuyaki — Second Pass</title>
  <script>p5.disableFriendlyErrors = true;</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #08080c; color: #888; font: 13px 'Courier New', monospace; }
    h1 { text-align: center; padding: 28px 20px 4px; color: #444; font-size: 16px; letter-spacing: 5px; }
    .subtitle { text-align: center; color: #333; font-size: 11px; margin-bottom: 24px; letter-spacing: 2px; }
    #gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 0 16px 40px; max-width: 1100px; margin: 0 auto; }
    @media (max-width: 900px) { #gallery { grid-template-columns: 1fr; } }
    .card { background: #0b0b10; border: 1px solid #181820; border-radius: 5px; overflow: hidden; transition: border-color 0.3s; }
    .card:hover { border-color: #333; }
    .card-head { padding: 10px 14px; display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #14141a; }
    .card-title { font-weight: bold; font-size: 13px; }
    .card-meta { font-size: 10px; color: #444; }
    .card-canvas { width: 100%; aspect-ratio: 1; }
    .card-code { padding: 10px 14px; border-top: 1px solid #14141a; }
    .card-code pre { font-size: 10.5px; color: #555; white-space: pre-wrap; word-break: break-all; line-height: 1.5; }
    .card-note { font-size: 10px; color: #444; margin-top: 6px; line-height: 1.5; }
    .charcount { font-size: 10px; margin-top: 4px; }
    .ok { color: #3a6; }
    .tight { color: #da3; }
  </style>
</head>
<body>
<h1>THE DECIMAL LABYRINTH</h1>
<div class="subtitle">10 zones · second pass · つぶやき NUMOGRAM</div>
<div id="gallery"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// SECOND PASS — refined, varied complexity
// ═══════════════════════════════════════════════════════════════════

const ZONES = [
  // ─── ZONE 0: VOID — radical simplicity. 10 points. that's it. ───
  {
    id: 0, name: "Void", region: "plex", color: [68,68,68], hex: "#444444",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0);noStroke();for(n=0;n<10;n++){a=n+f/2e3;fill(44,18+12*sin(f/60+n));circle(250+cos(a)*180,250+sin(a)*180,8)}}`,
    note: "Radical simplicity. 10 points. One orbit. Period measured in minutes. The void is patient.",
    draw(p) {
      p.background(0); p.noStroke();
      for (let n = 0; n < 10; n++) {
        let a = n + p.frameCount / 2000;
        p.fill(44, 18 + 12 * Math.sin(p.frameCount / 60 + n));
        p.ellipse(250 + Math.cos(a) * 180, 250 + Math.sin(a) * 180, 8);
      }
    }
  },

  // ─── ZONE 1: STABILITY — grid with connecting lines ──────────────
  {
    id: 1, name: "Stability", region: "torque", color: [255,215,0], hex: "#FFD700",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0);for(x=25;x<W;x+=50)for(y=25;y<W;y+=50){d=noise(x/200,y/200,f/300)*10;stroke(255,215,0,18);if(x<475)line(x+d,y+d,x+50+d,y+d);stroke(255,215,0,44);noFill();circle(x+d,y+d,5)}}`,
    note: "Gold grid with connected lines. The lattice breathes but holds. Structure as promise.",
    draw(p) {
      p.background(0);
      for (let x = 25; x < 500; x += 50)
        for (let y = 25; y < 500; y += 50) {
          let d = p.noise(x / 200, y / 200, p.frameCount / 300) * 10;
          // Horizontal connection
          p.stroke(255, 215, 0, 18);
          if (x < 475) p.line(x + d, y + d, x + 50 + d, y + d);
          // Node
          p.stroke(255, 215, 0, 44);
          p.noFill();
          p.ellipse(x + d, y + d, 5);
        }
    }
  },

  // ─── ZONE 2: SEPARATION — single point that splits into two ──────
  {
    id: 2, name: "Separation", region: "torque", color: [255,140,0], hex: "#FF8C00",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0,4);noStroke();for(n=0;n<100;n++){t=n/100;d=t*150*abs(sin(t*PI+f/200));fill(255,140,0,30+t*30);circle(250+d,t*W,4);circle(250-d,t*W,4)}}`,
    note: "One stream forks into two. The split widens with descent. The wound deepens.",
    draw(p) {
      p.background(0, 4); p.noStroke();
      for (let n = 0; n < 100; n++) {
        let t = n / 100;
        let d = t * 150 * Math.abs(Math.sin(t * Math.PI + p.frameCount / 200));
        p.fill(255, 140, 0, 30 + t * 30);
        p.ellipse(250 + d, t * 500, 4);
        p.ellipse(250 - d, t * 500, 4);
      }
    }
  },

  // ─── ZONE 3: RELEASE — dual counter-rotating vortices ────────────
  {
    id: 3, name: "Release", region: "warp", color: [255,0,255], hex: "#FF00FF",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0,15);noStroke();for(n=0;n<200;n++){a=n/200*TAU+f/40;r=30+noise(n/25,f/180)*130;fill(255,0,255,15);circle(200+r*cos(a),250+r*sin(a),4);circle(300-r*cos(a),250-r*sin(a),4)}}`,
    note: "Two counter-rotating magenta vortices. Release as paired forces — push and pull.",
    draw(p) {
      p.background(0, 15); p.noStroke();
      for (let n = 0; n < 200; n++) {
        let a = n / 200 * Math.PI * 2 + p.frameCount / 40;
        let r = 30 + p.noise(n / 25, p.frameCount / 180) * 130;
        p.fill(255, 0, 255, 15);
        // Left vortex (clockwise)
        p.ellipse(200 + r * Math.cos(a), 250 + r * Math.sin(a), 4);
        // Right vortex (counter-clockwise)
        p.ellipse(300 - r * Math.cos(a), 250 - r * Math.sin(a), 4);
      }
    }
  },

  // ─── ZONE 4: CATASTROPHE — expanding ripples, concentric ────────
  {
    id: 4, name: "Catastrophe", region: "torque", color: [0,255,255], hex: "#00FFFF",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0);noFill();for(n=0;n<25;n++){F=(f+n*9)%225;stroke(0,255,255,225-F);strokeWeight(2);circle(250,250,F*F/100)}}`,
    note: "Concentric ripples expanding from center. Catastrophe as wave, not collapse. 暗夜の下 technique.",
    draw(p) {
      p.background(0); p.noFill();
      for (let n = 0; n < 25; n++) {
        let F = (p.frameCount + n * 9) % 225;
        p.stroke(0, 255, 255, 225 - F);
        p.strokeWeight(2);
        p.ellipse(250, 250, F * F / 100);
      }
    }
  },

  // ─── ZONE 5: PRESSURE — 3 breathing rings + particles ──────────
  {
    id: 5, name: "Pressure", region: "torque", color: [0,255,0], hex: "#00FF00",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0,6);noStroke();for(n=0;n<3;n++){r=80+n*65+sin(f/40+n)*25;for(i=0;i<80;i++){a=i/80*TAU;fill(0,255,0,14);circle(250+r*cos(a),250+r*sin(a),3)}}}`,
    note: "Three concentric breathing rings. Pressure as layered containment. The squeeze has structure.",
    draw(p) {
      p.background(0, 6); p.noStroke();
      for (let n = 0; n < 3; n++) {
        let r = 80 + n * 65 + Math.sin(p.frameCount / 40 + n) * 25;
        for (let i = 0; i < 80; i++) {
          let a = i / 80 * Math.PI * 2;
          p.fill(0, 255, 0, 14);
          p.ellipse(250 + r * Math.cos(a), 250 + r * Math.sin(a), 3);
        }
      }
    }
  },

  // ─── ZONE 6: ABSTRACTION — 12 circles connected by lines ────────
  {
    id: 6, name: "Abstraction", region: "warp", color: [0,128,255], hex: "#0080FF",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0,12);for(n=0;n<12;n++){a=n*TAU/12+f/200;x=250+cos(a)*130;y=250+sin(a)*130;stroke(0,128,255,12);b=(n+1)%12*TAU/12+f/200;line(x,y,250+cos(b)*130,250+sin(b)*130);noStroke();fill(0,128,255,22);circle(x,y,50)}}`,
    note: "12 circles on a ring, connected by lines. Geometry approaching consciousness.",
    draw(p) {
      p.background(0, 12);
      for (let n = 0; n < 12; n++) {
        let a = n * Math.PI * 2 / 12 + p.frameCount / 200;
        let x = 250 + Math.cos(a) * 130;
        let y = 250 + Math.sin(a) * 130;
        // Line to next
        p.stroke(0, 128, 255, 12);
        let b = ((n + 1) % 12) * Math.PI * 2 / 12 + p.frameCount / 200;
        p.line(x, y, 250 + Math.cos(b) * 130, 250 + Math.sin(b) * 130);
        // Circle
        p.noStroke();
        p.fill(0, 128, 255, 22);
        p.ellipse(x, y, 50);
      }
    }
  },

  // ─── ZONE 7: BLOOD — pulsing concentric rings, organic ──────────
  {
    id: 7, name: "Blood", region: "torque", color: [255,51,51], hex: "#FF3333",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0,5);noFill();for(n=0;n<30;n++){F=(f+n*4)%300;r=F/2+noise(F/99,f/100)*40;stroke(255,33,33,max(0,60-F/5));strokeWeight(1.5);ellipse(250,250,r*1.4,r)}}`,
    note: "Concentric rings expanding and breathing. Elliptical distortion. The body's circulatory rhythm.",
    draw(p) {
      p.background(0, 5); p.noFill();
      for (let n = 0; n < 30; n++) {
        let F = (p.frameCount + n * 4) % 300;
        let r = F / 2 + p.noise(F / 99, p.frameCount / 100) * 40;
        let alpha = Math.max(0, 60 - F / 5);
        p.stroke(255, 33, 33, alpha);
        p.strokeWeight(1.5);
        // Elliptical — wider than tall, like a vessel cross-section
        p.ellipse(250, 250, r * 1.4, r);
      }
    }
  },

  // ─── ZONE 8: MULTIPLICITY — complex. 120 particles, 4 modes ─────
  {
    id: 8, name: "Multiplicity", region: "torque", color: [192,160,255], hex: "#C0A0FF",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0,10);noStroke();for(n=0;n<120;n++){m=n%4;t=n/120;x=250+cos(t*TAU*m+f/80)*(80+m*40)+noise(n,f/200)*40;y=250+sin(t*TAU*m+f/60)*(80+m*40)+noise(n+50,f/200)*40;s=2+m+noise(n)*3;fill(192-m*15,160+m*10,255,18+m*4);circle(x,y,s)}}`,
    note: "120 particles, 4 behavioral modes. Emergence from shared template. Identity as divergence.",
    draw(p) {
      p.background(0, 10); p.noStroke();
      for (let n = 0; n < 120; n++) {
        let m = n % 4;  // mode: 0,1,2,3
        let t = n / 120;
        let orbitR = 80 + m * 40;
        let x = 250 + Math.cos(t * Math.PI * 2 * m + p.frameCount / 80) * orbitR
                + p.noise(n, p.frameCount / 200) * 40;
        let y = 250 + Math.sin(t * Math.PI * 2 * m + p.frameCount / 60) * orbitR
                + p.noise(n + 50, p.frameCount / 200) * 40;
        let s = 2 + m + p.noise(n) * 3;
        // Each mode has slightly different color
        p.fill(192 - m * 15, 160 + m * 10, 255, 18 + m * 4);
        p.ellipse(x, y, s);
      }
    }
  },

  // ─── ZONE 9: IRON CORE — spiral pulling inward ──────────────────
  {
    id: 9, name: "Iron Core", region: "plex", color: [153,0,255], hex: "#9900FF",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0,4);noStroke();for(n=0;n<300;n++){a=n+f/40;r=250-noise(n/50,f/100)*240;fill(153,0,255,18);circle(250+r*cos(a)*.9,250+r*sin(a)*.9,4)}}`,
    note: "Purple spiral collapse. Everything to the center. The plex singularity folding inward.",
    draw(p) {
      p.background(0, 4); p.noStroke();
      for (let n = 0; n < 300; n++) {
        let a = n + p.frameCount / 40;
        let r = 250 - p.noise(n / 50, p.frameCount / 100) * 240;
        p.fill(153, 0, 255, 18);
        p.ellipse(250 + r * Math.cos(a) * 0.9, 250 + r * Math.sin(a) * 0.9, 4);
      }
    }
  },
];

// ═══════════════════════════════════════════════════════════════════
// GALLERY
// ═══════════════════════════════════════════════════════════════════

window.addEventListener('DOMContentLoaded', () => {
  const gallery = document.getElementById('gallery');

  ZONES.forEach((z) => {
    const card = document.createElement('div');
    card.className = 'card';
    const chars = z.code.length;
    const cls = chars <= 250 ? 'ok' : 'tight';

    card.innerHTML = `
      <div class="card-head">
        <span class="card-title" style="color:${z.hex}">ZONE ${z.id} — ${z.name.toUpperCase()}</span>
        <span class="card-meta">${z.region}</span>
      </div>
      <div class="card-canvas" id="canvas-${z.id}"></div>
      <div class="card-code">
        <pre>${z.code}</pre>
        <div class="charcount ${cls}">${chars}/280</div>
        <div class="card-note">${z.note}</div>
      </div>
    `;
    gallery.appendChild(card);

    const container = document.getElementById(`canvas-${z.id}`);
    new p5((p) => {
      p.setup = () => {
        p.createCanvas(500, 500);
        p.pixelDensity(1);
        p.noiseSeed(z.id * 137 + 666);
      };
      p.draw = () => { z.draw(p); };
    }, container);
  });
});
</script>
</body>
</html>
