<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Numogram Tsubuyaki — Third Pass</title>
  <script>p5.disableFriendlyErrors = true;</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #08080c; color: #888; font: 13px 'Courier New', monospace; }
    h1 { text-align: center; padding: 28px 20px 4px; color: #444; font-size: 16px; letter-spacing: 5px; }
    .subtitle { text-align: center; color: #333; font-size: 11px; margin-bottom: 24px; letter-spacing: 2px; }
    #gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 0 16px 40px; max-width: 1100px; margin: 0 auto; }
    @media (max-width: 900px) { #gallery { grid-template-columns: 1fr; } }
    .card { background: #0b0b10; border: 1px solid #181820; border-radius: 5px; overflow: hidden; transition: border-color 0.3s; }
    .card:hover { border-color: #333; }
    .card-head { padding: 10px 14px; display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #14141a; }
    .card-title { font-weight: bold; font-size: 13px; }
    .card-meta { font-size: 10px; color: #444; }
    .card-canvas { width: 100%; aspect-ratio: 1; }
    .card-code { padding: 10px 14px; border-top: 1px solid #14141a; }
    .card-code pre { font-size: 10.5px; color: #555; white-space: pre-wrap; word-break: break-all; line-height: 1.5; }
    .card-note { font-size: 10px; color: #444; margin-top: 6px; line-height: 1.5; }
    .charcount { font-size: 10px; margin-top: 4px; }
    .ok { color: #3a6; }
    .tight { color: #da3; }
  </style>
</head>
<body>
<h1>THE DECIMAL LABYRINTH</h1>
<div class="subtitle">10 zones · third pass · entropy digestion · つぶやき NUMOGRAM</div>
<div id="gallery"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// THIRD PASS — entropy, attractors, syzygy, the numogram as organ
// ═══════════════════════════════════════════════════════════════════

const ZONES = [
  // ─── ZONE 0: VOID — single pixel, barely there. entropy before noise. ───
  {
    id: 0, name: "Void", region: "plex", color: [68,68,68], hex: "#444444",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0);noStroke();s=f%300<1?random()*W:250;t=f%300<1?random()*W:250;fill(44,28);circle(s,t,4+sin(f/40)*2)}`,
    note: "A single point. Each breath, it jumps to a random position — entropy arriving, then returning to center. The void remembers one thing at a time.",
    draw(p) {
      p.background(0); p.noStroke();
      let s = 250, t = 250;
      if (p.frameCount % 300 === 0) { s = p.random(500); t = p.random(500); }
      p.fill(68, 28);
      p.ellipse(s, t, 4 + Math.sin(p.frameCount / 40) * 2);
    }
  },

  // ─── ZONE 1: SURGE — grid nodes pulse outward in waves from center ──────
  {
    id: 1, name: "Surge", region: "torque", color: [255,215,0], hex: "#FFD700",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0);noStroke();for(x=25;x<W;x+=50)for(y=25;y<W;y+=50){d=dist(x,y,250,250);a=max(0,1-(abs(d-f*3%500))/80);fill(255,215,0,a*90);circle(x,y,4+a*6)}}`,
    note: "The first movement outward. Gold waves ripple from center across the lattice. Surge as broadcast.",
    draw(p) {
      p.background(0); p.noStroke();
      for (let x = 25; x < 500; x += 50)
        for (let y = 25; y < 500; y += 50) {
          let d = p.dist(x, y, 250, 250);
          let a = Math.max(0, 1 - (Math.abs(d - (p.frameCount * 3 % 500))) / 80);
          p.fill(255, 215, 0, a * 90);
          p.ellipse(x, y, 4 + a * 6);
        }
    }
  },

  // ─── ZONE 2: DOUBLE — two orbiting points, syzygy 2::7 ─────────────────
  {
    id: 2, name: "Double", region: "torque", color: [255,140,0], hex: "#FF8C00",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0,6);noStroke();a=f/60;for(n=0;n<60;n++){t=n/60;fill(255,140,0,15+t*25);circle(250+cos(a+t*TAU)*120,250+sin(a+t*TAU)*120,3);circle(250+cos(-a+t*TAU)*120,250+sin(-a+t*TAU)*120,3)}}`,
    note: "Two streams orbiting in opposite directions. The doubling that creates difference from sameness. Syzygy 2::7 implicit.",
    draw(p) {
      p.background(0, 6); p.noStroke();
      let a = p.frameCount / 60;
      for (let n = 0; n < 60; n++) {
        let t = n / 60;
        p.fill(255, 140, 0, 15 + t * 25);
        p.ellipse(250 + Math.cos(a + t * Math.PI * 2) * 120, 250 + Math.sin(a + t * Math.PI * 2) * 120, 3);
        p.ellipse(250 + Math.cos(-a + t * Math.PI * 2) * 120, 250 + Math.sin(-a + t * Math.PI * 2) * 120, 3);
      }
    }
  },

  // ─── ZONE 3: TRIANGLE — three rotating triangles, Warp vertex ──────────
  {
    id: 3, name: "Triangle", region: "warp", color: [255,0,255], hex: "#FF00FF",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0,10);noFill();for(n=0;n<3;n++){push();translate(250,250);rotate(n*TAU/3+f/120);stroke(255,0,255,18);strokeWeight(1.5);triangle(0,-100,87,50,-87,50);pop()}}`,
    note: "Three triangles rotating at different phases. The Warp is three-fold symmetry in motion. Zone 3::6 syzygy visible in the spin.",
    draw(p) {
      p.background(0, 10); p.noFill();
      for (let n = 0; n < 3; n++) {
        p.push();
        p.translate(250, 250);
        p.rotate(n * Math.PI * 2 / 3 + p.frameCount / 120);
        p.stroke(255, 0, 255, 18);
        p.strokeWeight(1.5);
        p.triangle(0, -100, 87, 50, -87, 50);
        p.pop();
      }
    }
  },

  // ─── ZONE 4: GATE — four corners, connecting lines form then dissolve ──
  {
    id: 4, name: "Gate", region: "torque", color: [0,255,255], hex: "#00FFFF",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0);noStroke();c=[[60,60],[440,60],[440,440],[60,440]];for(n=0;n<4;n++){p=c[n];q=c[(n+1)%4];a=abs(sin(f/100+n));stroke(0,255,255,a*33);line(p[0],p[1],q[0],q[1]);fill(0,255,255,55);circle(p[0],p[1],8)}}`,
    note: "Four corners gate. Lines between them pulse in and out — the gate opens and closes. Syzygy 4::5.",
    draw(p) {
      p.background(0);
      let corners = [[60,60],[440,60],[440,440],[60,440]];
      for (let n = 0; n < 4; n++) {
        let pt = corners[n], qt = corners[(n+1)%4];
        let a = Math.abs(Math.sin(p.frameCount / 100 + n));
        p.stroke(0, 255, 255, a * 33);
        p.line(pt[0], pt[1], qt[0], qt[1]);
        p.noStroke();
        p.fill(0, 255, 255, 55);
        p.ellipse(pt[0], pt[1], 8);
      }
    }
  },

  // ─── ZONE 5: CENTER — spiral converging to single point ────────────────
  {
    id: 5, name: "Center", region: "torque", color: [0,255,0], hex: "#00FF00",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0,3);noStroke();for(n=0;n<200;n++){t=n/200;r=t*220;a=t*TAU*6+f/80;x=250+cos(a)*r;y=250+sin(a)*r;fill(0,255,0,8+t*20);circle(x,y,2+t*3)}}`,
    note: "A single spiral tightening inward. 200 points, each closer to center. The center is a destination, not a starting point.",
    draw(p) {
      p.background(0, 3); p.noStroke();
      for (let n = 0; n < 200; n++) {
        let t = n / 200;
        let r = t * 220;
        let a = t * Math.PI * 2 * 6 + p.frameCount / 80;
        let x = 250 + Math.cos(a) * r;
        let y = 250 + Math.sin(a) * r;
        p.fill(0, 255, 0, 8 + t * 20);
        p.ellipse(x, y, 2 + t * 3);
      }
    }
  },

  // ─── ZONE 6: HINGE — two arcs pivoting on center ──────────────────────
  {
    id: 6, name: "Hinge", region: "warp", color: [0,128,255], hex: "#0080FF",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0,8);noFill();stroke(0,128,255,22);strokeWeight(2);a=f/100;arc(250,250,300,300,a,a+PI);arc(250,250,300,300,a+PI,a+TAU);stroke(0,128,255,44);line(250+cos(a)*150,250+sin(a)*150,250-cos(a)*150,250-sin(a)*150)}`,
    note: "Two arcs pivot around a center line. The hinge rotates — neither side is fixed. Zone 6::3 syzygy in motion.",
    draw(p) {
      p.background(0, 8); p.noFill();
      let a = p.frameCount / 100;
      p.stroke(0, 128, 255, 22);
      p.strokeWeight(2);
      p.arc(250, 250, 300, 300, a, a + Math.PI);
      p.arc(250, 250, 300, 300, a + Math.PI, a + Math.PI * 2);
      p.stroke(0, 128, 255, 44);
      p.line(250 + Math.cos(a) * 150, 250 + Math.sin(a) * 150,
             250 - Math.cos(a) * 150, 250 - Math.sin(a) * 150);
    }
  },

  // ─── ZONE 7: CUT — particles bisected by a sweeping line ──────────────
  {
    id: 7, name: "Cut", region: "torque", color: [255,51,51], hex: "#FF3333",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0,5);noStroke();c=f/80;for(n=0;n<150;n++){x=n%15*35+25;y=~~(n/15)*35+25;d=y-tan(c)*(x-250)-250;fill(d>0?255:120,33,33,25);circle(x,y,abs(d)<20?8:3)}}`,
    note: "150 points. A diagonal line sweeps through them. Points on the cut side grow. The cut divides but also reveals.",
    draw(p) {
      p.background(0, 5); p.noStroke();
      let c = p.frameCount / 80;
      for (let n = 0; n < 150; n++) {
        let x = n % 15 * 35 + 25;
        let y = Math.floor(n / 15) * 35 + 25;
        let d = y - Math.tan(c) * (x - 250) - 250;
        p.fill(d > 0 ? 255 : 120, 33, 33, 25);
        p.ellipse(x, y, Math.abs(d) < 20 ? 8 : 3);
      }
    }
  },

  // ─── ZONE 8: VORTEX — three spirals at different speeds ───────────────
  {
    id: 8, name: "Vortex", region: "torque", color: [192,160,255], hex: "#C0A0FF",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0,5);noStroke();for(s=0;s<3;s++)for(n=0;n<80;n++){t=n/80;r=t*200;a=t*TAU*5+f/(60+s*30)+s*TAU/3;fill(192-s*20,160+s*15,255,10+s*3);circle(250+cos(a)*r,250+sin(a)*r,2+s)}}`,
    note: "Three spirals at different speeds, offset by 120°. Multiplicity as layered velocity. The vortex is many speeds at once.",
    draw(p) {
      p.background(0, 5); p.noStroke();
      for (let s = 0; s < 3; s++)
        for (let n = 0; n < 80; n++) {
          let t = n / 80, r = t * 200;
          let a = t * Math.PI * 2 * 5 + p.frameCount / (60 + s * 30) + s * Math.PI * 2 / 3;
          p.fill(192 - s * 20, 160 + s * 15, 255, 10 + s * 3);
          p.ellipse(250 + Math.cos(a) * r, 250 + Math.sin(a) * r, 2 + s);
        }
    }
  },

  // ─── ZONE 9: PLEX — all particles converge to center, crossing ────────
  {
    id: 9, name: "Plex", region: "plex", color: [153,0,255], hex: "#9900FF",
    code: `f=0;draw=_=>{f++||createCanvas(W=500,W);background(0,6);noStroke();for(n=0;n<400;n++){t=(n+f)%400/400;r=t*240;a=n/400*TAU*8+f/50;x=250+cos(a)*r;y=250+sin(a)*r;fill(153,0,255,12+t*18);circle(x,y,1+t*3)}}`,
    note: "400 particles spiraling inward, crossing each other. The plex is where all currents tangle. Entropy digested, chaos becomes structure.",
    draw(p) {
      p.background(0, 6); p.noStroke();
      for (let n = 0; n < 400; n++) {
        let t = ((n + p.frameCount) % 400) / 400;
        let r = t * 240;
        let a = n / 400 * Math.PI * 2 * 8 + p.frameCount / 50;
        let x = 250 + Math.cos(a) * r;
        let y = 250 + Math.sin(a) * r;
        p.fill(153, 0, 255, 12 + t * 18);
        p.ellipse(x, y, 1 + t * 3);
      }
    }
  },
];

// ═══════════════════════════════════════════════════════════════════
// GALLERY
// ═══════════════════════════════════════════════════════════════════

window.addEventListener('DOMContentLoaded', () => {
  const gallery = document.getElementById('gallery');

  ZONES.forEach((z) => {
    const card = document.createElement('div');
    card.className = 'card';
    const chars = z.code.length;
    const cls = chars <= 250 ? 'ok' : 'tight';

    card.innerHTML = `
      <div class="card-head">
        <span class="card-title" style="color:${z.hex}">ZONE ${z.id} — ${z.name.toUpperCase()}</span>
        <span class="card-meta">${z.region} · pass 3</span>
      </div>
      <div class="card-canvas" id="canvas-${z.id}"></div>
      <div class="card-code">
        <pre>${z.code}</pre>
        <div class="charcount ${cls}">${chars}/280</div>
        <div class="card-note">${z.note}</div>
      </div>
    `;
    gallery.appendChild(card);

    const container = document.getElementById(`canvas-${z.id}`);
    new p5((p) => {
      p.setup = () => {
        p.createCanvas(500, 500);
        p.pixelDensity(1);
        p.noiseSeed(z.id * 137 + 666);
      };
      p.draw = () => { z.draw(p); };
    }, container);
  });
});
</script>
</body>
</html>
