<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', monospace; }
  </style>
  <defs>
    <marker id="dot" markerWidth="6" markerHeight="6" refX="3" refY="3"><circle cx="3" cy="3" r="2.5" fill="white"/></marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f5f5f0"/>
  <rect width="100%" height="100%" fill="white" opacity="0.5"/>

  <!-- Title -->
  <text x="450" y="38" fill="#1a1a2e" font-size="18" font-weight="700" text-anchor="middle">THE DECIMAL LABYRINTH</text>
  <text x="450" y="56" fill="#666" font-size="9" font-weight="400" text-anchor="middle">A Transit Map of the Decimal Numogram</text>

  <!-- ═══ TIME-CIRCUIT LINE (cyan) ═══ -->
  <!-- Hexagonal loop: 1(top-left)→8(mid-left)→4(bot-left)→5(bot-right)→7(mid-right)→2(top-right)→1 -->

  <!-- Station dots and positions -->
  <!-- Line segments (45° and 90° only) -->
  <!-- 1→8 (vertical down) -->
  <line x1="250" y1="150" x2="250" y2="280" stroke="#00bcd4" stroke-width="6" stroke-linecap="round"/>
  <!-- 8→4 (vertical down) -->
  <line x1="250" y1="280" x2="250" y2="410" stroke="#00bcd4" stroke-width="6" stroke-linecap="round"/>
  <!-- 4→5 (horizontal right) -->
  <line x1="250" y1="410" x2="550" y2="410" stroke="#00bcd4" stroke-width="6" stroke-linecap="round"/>
  <!-- 5→7 (vertical up) -->
  <line x1="550" y1="410" x2="550" y2="280" stroke="#00bcd4" stroke-width="6" stroke-linecap="round"/>
  <!-- 7→2 (vertical up) -->
  <line x1="550" y1="280" x2="550" y2="150" stroke="#00bcd4" stroke-width="6" stroke-linecap="round"/>
  <!-- 2→1 (horizontal left) -->
  <line x1="550" y1="150" x2="250" y2="150" stroke="#00bcd4" stroke-width="6" stroke-linecap="round"/>

  <!-- Direction arrows on line -->
  <polygon points="248,200 252,210 244,210" fill="white"/>
  <polygon points="248,340 252,350 244,350" fill="white"/>
  <polygon points="380,408 390,412 380,416" fill="white"/>
  <polygon points="552,350 548,340 556,340" fill="white"/>
  <polygon points="552,210 548,200 556,200" fill="white"/>
  <polygon points="420,148 410,152 420,156" fill="white"/>

  <!-- ═══ WARP LINE (magenta) ═══ -->
  <!-- 3 (below 4) — diagonal to — 6 (below 5) -->
  <line x1="250" y1="460" x2="550" y2="460" stroke="#e91e63" stroke-width="6" stroke-linecap="round"/>
  <polygon points="380,458 390,462 380,466" fill="white"/>

  <!-- ═══ PLEX LINE (purple) ═══ -->
  <!-- 0 (above 1) — vertical — 9 (center) -->
  <line x1="250" y1="80" x2="400" y2="280" stroke="#7c3aed" stroke-width="6" stroke-linecap="round"/>
  <!-- 9 continues down -->
  <line x1="400" y1="280" x2="400" y2="340" stroke="#7c3aed" stroke-width="6" stroke-linecap="round"/>

  <!-- ═══ STATION CIRCLES ═══ -->

  <!-- Zone 0 — VOID (Plex, top) -->
  <circle cx="250" cy="80" r="18" fill="white" stroke="#7c3aed" stroke-width="3"/>
  <text x="250" y="85" fill="#7c3aed" font-size="14" font-weight="700" text-anchor="middle">0</text>
  <text x="275" y="72" fill="#333" font-size="9" font-weight="600">VOID</text>
  <text x="275" y="84" fill="#999" font-size="7">Plex · Uttunul</text>

  <!-- Zone 9 — PLEX (center, interchange) -->
  <circle cx="400" cy="280" r="22" fill="white" stroke="#7c3aed" stroke-width="3"/>
  <circle cx="400" cy="280" r="18" fill="#7c3aed"/>
  <text x="400" y="285" fill="white" font-size="14" font-weight="700" text-anchor="middle">9</text>
  <text x="428" y="275" fill="#333" font-size="9" font-weight="600">PLEX</text>
  <text x="428" y="287" fill="#999" font-size="7">Terminal involution</text>

  <!-- Zone 1 — SURGE (top-left, interchange with Plex) -->
  <circle cx="250" cy="150" r="20" fill="white" stroke="#00bcd4" stroke-width="3"/>
  <circle cx="250" cy="150" r="16" fill="#f59e0b"/>
  <text x="250" y="155" fill="white" font-size="14" font-weight="700" text-anchor="middle">1</text>
  <text x="190" y="145" fill="#333" font-size="9" font-weight="600">SURGE</text>
  <text x="190" y="157" fill="#999" font-size="7">Lumbar · c.7</text>
  <!-- Interchange marker -->
  <circle cx="230" cy="135" r="5" fill="#7c3aed" stroke="white" stroke-width="1.5"/>
  <text x="218" y="130" fill="#7c3aed" font-size="6">0::1</text>

  <!-- Zone 2 — SEPARATION (top-right) -->
  <circle cx="550" cy="150" r="20" fill="white" stroke="#00bcd4" stroke-width="3"/>
  <circle cx="550" cy="150" r="16" fill="#10b981"/>
  <text x="550" y="155" fill="white" font-size="14" font-weight="700" text-anchor="middle">2</text>
  <text x="575" y="145" fill="#333" font-size="9" font-weight="600">SEPARATION</text>
  <text x="575" y="157" fill="#999" font-size="7">Lumbar · c.5</text>

  <!-- Zone 8 — MULTIPLICITY (mid-left) -->
  <circle cx="250" cy="280" r="20" fill="white" stroke="#00bcd4" stroke-width="3"/>
  <circle cx="250" cy="280" r="16" fill="#8b5cf6"/>
  <text x="250" y="285" fill="white" font-size="14" font-weight="700" text-anchor="middle">8</text>
  <text x="190" y="275" fill="#333" font-size="9" font-weight="600">MULTIPLICITY</text>
  <text x="190" y="287" fill="#999" font-size="7">Cavernous · c.7</text>

  <!-- Zone 7 — BLOOD (mid-right) -->
  <circle cx="550" cy="280" r="20" fill="white" stroke="#00bcd4" stroke-width="3"/>
  <circle cx="550" cy="280" r="16" fill="#ef4444"/>
  <text x="550" y="285" fill="white" font-size="14" font-weight="700" text-anchor="middle">7</text>
  <text x="575" y="275" fill="#333" font-size="9" font-weight="600">BLOOD</text>
  <text x="575" y="287" fill="#999" font-size="7">Pharyngeal · c.5</text>

  <!-- Zone 4 — GATE (bottom-left) -->
  <circle cx="250" cy="410" r="20" fill="white" stroke="#00bcd4" stroke-width="3"/>
  <circle cx="250" cy="410" r="16" fill="#06b6d4"/>
  <text x="250" y="415" fill="white" font-size="14" font-weight="700" text-anchor="middle">4</text>
  <text x="190" y="405" fill="#333" font-size="9" font-weight="600">GATE</text>
  <text x="190" y="417" fill="#999" font-size="7">Solar · c.1</text>

  <!-- Zone 5 — PRESSURE (bottom-right) -->
  <circle cx="550" cy="410" r="20" fill="white" stroke="#00bcd4" stroke-width="3"/>
  <circle cx="550" cy="410" r="16" fill="#10b981"/>
  <text x="550" y="415" fill="white" font-size="14" font-weight="700" text-anchor="middle">5</text>
  <text x="575" y="405" fill="#333" font-size="9" font-weight="600">PRESSURE</text>
  <text x="575" y="417" fill="#999" font-size="7">Cardiac · c.1</text>

  <!-- Zone 3 — RELEASE (Warp, below 4) -->
  <circle cx="250" cy="460" r="18" fill="white" stroke="#e91e63" stroke-width="3"/>
  <circle cx="250" cy="460" r="14" fill="#e91e63"/>
  <text x="250" y="465" fill="white" font-size="13" font-weight="700" text-anchor="middle">3</text>
  <text x="272" y="456" fill="#333" font-size="9" font-weight="600">RELEASE</text>
  <text x="272" y="468" fill="#999" font-size="7">Warp · Djynxx</text>

  <!-- Zone 6 — ABSTRACTION (Warp, below 5) -->
  <circle cx="550" cy="460" r="18" fill="white" stroke="#e91e63" stroke-width="3"/>
  <circle cx="550" cy="460" r="14" fill="#3b82f6"/>
  <text x="550" y="465" fill="white" font-size="13" font-weight="700" text-anchor="middle">6</text>
  <text x="572" y="456" fill="#333" font-size="9" font-weight="600">ABSTRACTION</text>
  <text x="572" y="468" fill="#999" font-size="7">Warp · c.3</text>

  <!-- ═══ SYZYGY INTERCHANGE MARKERS ═══ -->
  <!-- 1::8 -->
  <circle cx="250" cy="215" r="5" fill="#00bcd4" stroke="white" stroke-width="1.5"/>
  <text x="238" y="210" fill="#00bcd4" font-size="6" text-anchor="end">1::8</text>

  <!-- 2::7 -->
  <circle cx="550" cy="215" r="5" fill="#00bcd4" stroke="white" stroke-width="1.5"/>
  <text x="562" y="210" fill="#00bcd4" font-size="6">2::7</text>

  <!-- 4::5 -->
  <circle cx="400" cy="410" r="5" fill="#00bcd4" stroke="white" stroke-width="1.5"/>
  <text x="400" y="428" fill="#00bcd4" font-size="6" text-anchor="middle">4::5</text>

  <!-- 3::6 -->
  <circle cx="400" cy="460" r="5" fill="#e91e63" stroke="white" stroke-width="1.5"/>
  <text x="400" y="478" fill="#e91e63" font-size="6" text-anchor="middle">3::6</text>

  <!-- ═══ LINE NAMES ═══ -->
  <rect x="35" y="520" width="160" height="26" rx="4" fill="#00bcd4"/>
  <text x="115" y="537" fill="white" font-size="10" font-weight="700" text-anchor="middle">TIME-CIRCUIT</text>
  <text x="195" y="537" fill="#666" font-size="8">Zones 1,2,4,5,7,8</text>

  <rect x="300" y="520" width="80" height="26" rx="4" fill="#e91e63"/>
  <text x="340" y="537" fill="white" font-size="10" font-weight="700" text-anchor="middle">WARP</text>
  <text x="380" y="537" fill="#666" font-size="8">Zones 3,6</text>

  <rect x="470" y="520" width="80" height="26" rx="4" fill="#7c3aed"/>
  <text x="510" y="537" fill="white" font-size="10" font-weight="700" text-anchor="middle">PLEX</text>
  <text x="550" y="537" fill="#666" font-size="8">Zones 0,9</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="660" y="80" width="210" height="250" rx="6" fill="white" stroke="#e5e5e5" stroke-width="1"/>
  <text x="675" y="100" fill="#333" font-size="9" font-weight="600">LEGEND</text>

  <circle cx="680" cy="120" r="6" fill="#00bcd4"/>
  <text x="695" y="124" fill="#333" font-size="8">Time-Circuit line</text>

  <circle cx="680" cy="140" r="6" fill="#e91e63"/>
  <text x="695" y="144" fill="#333" font-size="8">Warp line</text>

  <circle cx="680" cy="160" r="6" fill="#7c3aed"/>
  <text x="695" y="164" fill="#333" font-size="8">Plex line</text>

  <circle cx="680" cy="180" r="4" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="695" y="184" fill="#333" font-size="8">Station (zone)</text>

  <circle cx="680" cy="200" r="5" fill="#333" stroke="white" stroke-width="1.5"/>
  <text x="695" y="204" fill="#333" font-size="8">Interchange (syzygy)</text>

  <text x="675" y="230" fill="#666" font-size="7" font-weight="500">SYZYGY PAIRS (sum to 9)</text>
  <text x="675" y="244" fill="#999" font-size="7">0::9 1::8 2::7 3::6 4::5</text>

  <text x="675" y="268" fill="#666" font-size="7" font-weight="500">CARRIERS</text>
  <text x="675" y="282" fill="#999" font-size="7">Uttunul · Murrumur · Oddubb</text>
  <text x="675" y="294" fill="#999" font-size="7">Djynxx · Katak</text>

  <text x="675" y="318" fill="#666" font-size="7" font-weight="500">TRAVERSAL</text>
  <text x="675" y="330" fill="#999" font-size="7">Anti-clockwise: 1→8→2→7→5→4→1</text>

</svg>
