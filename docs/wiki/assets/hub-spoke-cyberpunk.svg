<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', monospace; }
  </style>
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a0030" stroke-width="0.3"/>
    </pattern>
    <filter id="neon-cyan"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="neon-mag"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="neon-purple"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#00ffff"/></marker>
    <marker id="arrow-mag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ff00ff"/></marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0a0a0a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="450" y="38" fill="#ff00ff" font-size="18" font-weight="700" text-anchor="middle" filter="url(#neon-mag)">THE DECIMAL LABYRINTH</text>
  <text x="450" y="56" fill="#00ffff" font-size="9" font-weight="400" text-anchor="middle" filter="url(#neon-cyan)">10 ZONES · 3 REGIONS · 5 SYZYGIES</text>

  <!-- ═══ REGION RINGS ═══ -->
  <circle cx="450" cy="320" r="220" fill="none" stroke="#00ffff" stroke-width="0.8" stroke-dasharray="6,4" stroke-opacity="0.25" filter="url(#neon-cyan)"/>
  <text x="450" y="108" fill="#00ffff" font-size="7" font-weight="600" text-anchor="middle" filter="url(#neon-cyan)">TIME-CIRCUIT</text>
  <circle cx="450" cy="320" r="140" fill="none" stroke="#ff00ff" stroke-width="0.8" stroke-dasharray="6,4" stroke-opacity="0.2" filter="url(#neon-mag)"/>
  <text x="450" y="188" fill="#ff00ff" font-size="7" font-weight="600" text-anchor="middle" filter="url(#neon-mag)">WARP · CORRIDOR</text>
  <circle cx="450" cy="320" r="60" fill="none" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.4" filter="url(#neon-purple)"/>
  <text x="450" y="268" fill="#a855f7" font-size="7" font-weight="600" text-anchor="middle">PLEX</text>

  <!-- ═══ SYZYGY CONNECTIONS (neon lines) ═══ -->

  <!-- 1::8 -->
  <line x1="310" y1="265" x2="310" y2="375" stroke="#00ffff" stroke-width="1.5" stroke-opacity="0.5" filter="url(#neon-cyan)"/>
  <text x="296" y="324" fill="#00ffff" font-size="7" font-weight="500" text-anchor="end">1::8</text>

  <!-- 2::7 -->
  <line x1="590" y1="265" x2="590" y2="375" stroke="#00ffff" stroke-width="1.5" stroke-opacity="0.5" filter="url(#neon-cyan)"/>
  <text x="604" y="324" fill="#00ffff" font-size="7" font-weight="500">2::7</text>

  <!-- 3::6 -->
  <line x1="395" y1="440" x2="505" y2="440" stroke="#ff00ff" stroke-width="1.5" stroke-opacity="0.5" filter="url(#neon-mag)"/>
  <text x="450" y="455" fill="#ff00ff" font-size="7" font-weight="500" text-anchor="middle">3::6</text>

  <!-- 4::5 -->
  <line x1="260" y1="400" x2="640" y2="400" stroke="#00ffff" stroke-width="1" stroke-opacity="0.3" filter="url(#neon-cyan)"/>
  <text x="450" y="393" fill="#00ffff" font-size="7" font-weight="500" text-anchor="middle">4::5</text>

  <!-- ═══ TIME-CIRCUIT PATH (flowing arrows) ═══ -->

  <!-- 1→8 -->
  <path d="M 322 282 L 318 310" fill="none" stroke="#00ffff" stroke-width="1.2" marker-end="url(#arrow-cyan)" stroke-opacity="0.7" filter="url(#neon-cyan)"/>
  <!-- 8→2 -->
  <path d="M 340 390 L 540 380" fill="none" stroke="#00ffff" stroke-width="1.2" marker-end="url(#arrow-cyan)" stroke-opacity="0.7" filter="url(#neon-cyan)"/>
  <!-- 2→7 -->
  <path d="M 578 282 L 582 310" fill="none" stroke="#00ffff" stroke-width="1.2" marker-end="url(#arrow-cyan)" stroke-opacity="0.7" filter="url(#neon-cyan)"/>
  <!-- 7→5 -->
  <path d="M 610 380 L 648 392" fill="none" stroke="#00ffff" stroke-width="1.2" marker-end="url(#arrow-cyan)" stroke-opacity="0.7" filter="url(#neon-cyan)"/>
  <!-- 5→4 -->
  <path d="M 648 410 L 252 410" fill="none" stroke="#00ffff" stroke-width="1.2" marker-end="url(#arrow-cyan)" stroke-opacity="0.7" filter="url(#neon-cyan)"/>
  <!-- 4→1 -->
  <path d="M 252 390 L 310 268" fill="none" stroke="#00ffff" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- ═══ ZONE NODES ═══ -->

  <!-- Central hub: Zone 0 + 9 (Plex) -->
  <circle cx="450" cy="310" r="45" fill="#0a0a0a" stroke="#a855f7" stroke-width="2" filter="url(#neon-purple)"/>
  <circle cx="450" cy="310" r="42" fill="rgba(76,29,149,0.15)"/>
  <text x="438" y="304" fill="#a855f7" font-size="18" font-weight="700">0</text>
  <text x="458" y="304" fill="#a855f7" font-size="18" font-weight="700">9</text>
  <text x="450" y="322" fill="white" font-size="8" font-weight="600" text-anchor="middle">VOID · PLEX</text>
  <text x="450" y="334" fill="#64748b" font-size="6" text-anchor="middle">Uttunul 9::0</text>

  <!-- Zone 1 — SURGE (upper-left) -->
  <circle cx="310" cy="250" r="32" fill="#0a0a0a" stroke="#fbbf24" stroke-width="1.5" filter="url(#neon-cyan)"/>
  <circle cx="310" cy="250" r="29" fill="rgba(120,53,15,0.15)"/>
  <text x="310" y="248" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">1</text>
  <text x="310" y="262" fill="white" font-size="7" font-weight="600" text-anchor="middle">SURGE</text>
  <text x="310" y="224" fill="#c084fc" font-size="6" text-anchor="middle">Murrumur</text>

  <!-- Zone 2 — SEPARATION (upper-right) -->
  <circle cx="590" cy="250" r="32" fill="#0a0a0a" stroke="#34d399" stroke-width="1.5" filter="url(#neon-cyan)"/>
  <circle cx="590" cy="250" r="29" fill="rgba(6,78,59,0.15)"/>
  <text x="590" y="248" fill="#34d399" font-size="16" font-weight="700" text-anchor="middle">2</text>
  <text x="590" y="262" fill="white" font-size="7" font-weight="600" text-anchor="middle">SEPARATION</text>

  <!-- Zone 8 — MULTIPLICITY (mid-left) -->
  <circle cx="310" cy="390" r="32" fill="#0a0a0a" stroke="#c084fc" stroke-width="1.5" filter="url(#neon-cyan)"/>
  <circle cx="310" cy="390" r="29" fill="rgba(76,29,149,0.15)"/>
  <text x="310" y="388" fill="#c084fc" font-size="16" font-weight="700" text-anchor="middle">8</text>
  <text x="310" y="402" fill="white" font-size="7" font-weight="600" text-anchor="middle">MULTIPLICITY</text>

  <!-- Zone 7 — BLOOD (mid-right) -->
  <circle cx="590" cy="390" r="32" fill="#0a0a0a" stroke="#fb7185" stroke-width="1.5" filter="url(#neon-cyan)"/>
  <circle cx="590" cy="390" r="29" fill="rgba(136,19,55,0.15)"/>
  <text x="590" y="388" fill="#fb7185" font-size="16" font-weight="700" text-anchor="middle">7</text>
  <text x="590" y="402" fill="white" font-size="7" font-weight="600" text-anchor="middle">BLOOD</text>
  <text x="590" y="426" fill="#fb7185" font-size="6" text-anchor="middle">Oddubb</text>

  <!-- Zone 4 — GATE (lower-left, further out) -->
  <circle cx="240" cy="400" r="28" fill="#0a0a0a" stroke="#00ffff" stroke-width="1.5" filter="url(#neon-cyan)"/>
  <circle cx="240" cy="400" r="25" fill="rgba(8,51,68,0.15)"/>
  <text x="240" y="398" fill="#00ffff" font-size="14" font-weight="700" text-anchor="middle">4</text>
  <text x="240" y="410" fill="white" font-size="6" font-weight="600" text-anchor="middle">GATE</text>
  <text x="240" y="425" fill="#00ffff" font-size="6" text-anchor="middle">Katak</text>

  <!-- Zone 5 — PRESSURE (lower-right, further out) -->
  <circle cx="660" cy="400" r="28" fill="#0a0a0a" stroke="#34d399" stroke-width="1.5" filter="url(#neon-cyan)"/>
  <circle cx="660" cy="400" r="25" fill="rgba(6,78,59,0.15)"/>
  <text x="660" y="398" fill="#34d399" font-size="14" font-weight="700" text-anchor="middle">5</text>
  <text x="660" y="410" fill="white" font-size="6" font-weight="600" text-anchor="middle">PRESSURE</text>

  <!-- Zone 3 — RELEASE (warp, lower-left outer) -->
  <circle cx="395" cy="460" r="28" fill="#0a0a0a" stroke="#ff00ff" stroke-width="1.5" filter="url(#neon-mag)"/>
  <circle cx="395" cy="460" r="25" fill="rgba(76,29,149,0.15)"/>
  <text x="395" y="458" fill="#ff00ff" font-size="14" font-weight="700" text-anchor="middle">3</text>
  <text x="395" y="470" fill="white" font-size="6" font-weight="600" text-anchor="middle">RELEASE</text>
  <text x="395" y="490" fill="#ff00ff" font-size="6" text-anchor="middle">Djynxx</text>

  <!-- Zone 6 — ABSTRACTION (warp, lower-right outer) -->
  <circle cx="505" cy="460" r="28" fill="#0a0a0a" stroke="#60a5fa" stroke-width="1.5" filter="url(#neon-mag)"/>
  <circle cx="505" cy="460" r="25" fill="rgba(59,130,246,0.15)"/>
  <text x="505" y="458" fill="#60a5fa" font-size="14" font-weight="700" text-anchor="middle">6</text>
  <text x="505" y="470" fill="white" font-size="6" font-weight="600" text-anchor="middle">ABSTRACTION</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="680" y="80" width="195" height="210" rx="6" fill="rgba(10,10,10,0.9)" stroke="#1a0030" stroke-width="1"/>
  <text x="695" y="100" fill="#ff00ff" font-size="9" font-weight="600" filter="url(#neon-mag)">LEGEND</text>

  <circle cx="700" cy="118" r="5" fill="rgba(30,41,59,0.5)" stroke="#a855f7" stroke-width="1"/>
  <text x="715" y="122" fill="#a855f7" font-size="8">PLEX (0, 9)</text>

  <circle cx="700" cy="138" r="5" fill="rgba(8,51,68,0.3)" stroke="#00ffff" stroke-width="1"/>
  <text x="715" y="142" fill="#00ffff" font-size="8">TIME-CIRCUIT (1,2,4,5,7,8)</text>

  <circle cx="700" cy="158" r="5" fill="rgba(76,29,149,0.3)" stroke="#ff00ff" stroke-width="1"/>
  <text x="715" y="162" fill="#ff00ff" font-size="8">WARP (3, 6)</text>

  <line x1="690" y1="180" x2="715" y2="180" stroke="#00ffff" stroke-width="1.5" stroke-opacity="0.7"/>
  <text x="723" y="184" fill="#94a3b8" font-size="7">SYZYGY (sums to 9)</text>

  <line x1="690" y1="200" x2="715" y2="200" stroke="#00ffff" stroke-width="1.2" marker-end="url(#arrow-cyan)"/>
  <text x="723" y="204" fill="#94a3b8" font-size="7">CURRENT (flow)</text>

  <text x="695" y="228" fill="#64748b" font-size="7" font-weight="500">CARRIERS</text>
  <text x="695" y="242" fill="#475569" font-size="7">Uttunul · Murrumur · Oddubb</text>
  <text x="695" y="254" fill="#475569" font-size="7">Djynxx · Katak</text>

  <text x="695" y="276" fill="#475569" font-size="7">Traversal: 1→8→2→7→5→4→1</text>

  <!-- Traversal subtitle -->
  <text x="450" y="575" fill="#475569" font-size="8" text-anchor="middle">ANTI-CLOCKWISE TRAVERSAL: 1 → 8 → 2 → 7 → 5 → 4 → 1</text>
</svg>
