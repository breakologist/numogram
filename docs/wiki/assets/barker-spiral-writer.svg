<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap");
    text {{ font-family: "Crimson Text", serif; fill: #e2e8f0; }}
    .label {{ font-size: 12px; fill: #d1d5d9; }}
    .title {{ font-size: 20px; font-weight: 600; fill: #f8fafc; text-shadow: 0 0 10px rgba(0,0,0,0.5); }}
    .zone {{ fill: none; stroke: #60a5fa; stroke-width: 0.5; opacity: 0.6; }}
    .spiral {{ fill: none; stroke: #a78bfa; stroke-width: 1; stroke-dasharray: 2 2; }}
  </style>
  <rect width="100%" height="100%" fill="#111111"/>
  <text x="450" y="35" class="title" text-anchor="middle">BARKER SPIRAL — The Diplozygotic Key</text>
  <circle cx="450" cy="320" r="8" fill="#fbbf24"/>
  <text x="470" y="324" class="label" fill="#fbbf24">5 ⊕ 5 = 10 (the infinitesimal gap)</text>
  <!-- Hand-drawn style spiral -->
  <path d="M 450 320 
           Q 480 250, 520 320 
           Q 480 390, 450 320" 
        class="spiral" opacity="0.7"/>
  <!-- Zone labels as marginalia -->
  <text x="50" y="100" class="label" transform="rotate(90, 50, 100)">Zone 0 — Uttunul</text>
  <text x="50" y="120" class="label" transform="rotate(90, 50, 120)">Zone 9 — Cthelll</text>
  <!-- More artistic elements -->
  </svg>