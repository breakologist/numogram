<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syzygy Dungeon Map — Numogram Procedural Generation</title>
  <script>p5.disableFriendlyErrors = true;</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #0a0a14; }
    canvas { display: block; }
    #info {
      position: absolute; top: 12px; left: 16px;
      color: #aab; font-family: 'Courier New', monospace;
      font-size: 12px; pointer-events: none; line-height: 1.6;
    }
    #controls {
      position: absolute; bottom: 16px; left: 16px;
      color: #668; font-family: 'Courier New', monospace;
      font-size: 11px; pointer-events: none;
    }
    #theorem-badge {
      position: absolute; top: 12px; right: 16px;
      color: #00d4ff; font-family: 'Courier New', monospace;
      font-size: 11px; pointer-events: none;
      background: rgba(0, 212, 255, 0.08); padding: 6px 12px;
      border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 4px;
    }
  </style>
</head>
<body>
<div id="info"></div>
<div id="theorem-badge">Σ(z₁,z₂)=9 · SYZYGY COMPLETION THEOREM</div>
<div id="controls">[1] Full Labyrinth &nbsp; [2] Torque Trinity &nbsp; [3] Warp/Plex Duality &nbsp; [H] Hide Info &nbsp; [S] Screenshot</div>
<script>
// === DUNGEON DATA ===
const DUNGEONS = {};

// Load dungeon data — injected at build time or fetched
const DUNGEON_FILES = {
  full: "syzygy_dungeon_full_labyrinth.json",
  torque: "syzygy_dungeon_torque_trinity.json",
  warp_plex: "syzygy_dungeon_warp_plex_duality.json"
};

// ZONE_COLORS
const ZC = {
  0: "#1a1a2e", 1: "#16213e", 2: "#0f3460",
  3: "#533483", 4: "#e94560", 5: "#f5a623",
  6: "#0f9b8e", 7: "#7b2d8e", 8: "#4a90d9",
  9: "#00d4ff"
};

const ZONE_NAMES = {
  0: "Void", 1: "Surge", 2: "Time-Circuit", 3: "Warp",
  4: "Gate", 5: "Sink", 6: "Abstraction", 7: "Rise",
  8: "Echo", 9: "Plex"
};

const DEMON_SIGILS = {
  "Murrumur": "◈", "Oddubb": "◎", "Djynxx": "⟐",
  "Katak": "⬡", "Uttunul": "◉"
};

// === GLOBALS ===
let dungeon = null;
let currentDungeon = "full";
let showInfo = true;
let hoveredRoom = null;
const roomCache = {};  // id -> {x, y, w, h, zone, ...}

// Edge types color
const EDGE_COLORS = {
  syzygy: "rgba(0, 212, 255, 0.7)",   // bright cyan — carrier current
  tree: "rgba(160, 160, 190, 0.35)",   // dim — traversal path
  loop: "rgba(245, 166, 35, 0.45)"     // amber — shortcut
};

// === PRELOAD ===
function preload() {
  // Dungeon data embedded inline to avoid fetch dependency
  DUNGEONS.full = {
    "rooms": [
      {"id":0,"zone":0,"title":"Void","cx":400,"cy":360,"w":90,"h":70,"zone_name":"Void","color":"#1a1a2e"},
      {"id":1,"zone":9,"title":"Plex","cx":560,"cy":360,"w":90,"h":70,"zone_name":"Plex","color":"#00d4ff"},
      {"id":2,"zone":1,"title":"Surge","cx":152,"cy":107,"w":63,"h":49,"zone_name":"Surge","color":"#16213e"},
      {"id":3,"zone":8,"title":"Echo","cx":272,"cy":107,"w":63,"h":49,"zone_name":"Echo","color":"#4a90d9"},
      {"id":4,"zone":2,"title":"Time-Circuit","cx":144,"cy":280,"w":63,"h":49,"zone_name":"Time-Circuit","color":"#0f3460"},
      {"id":5,"zone":7,"title":"Rise","cx":264,"cy":280,"w":63,"h":49,"zone_name":"Rise","color":"#7b2d8e"},
      {"id":6,"zone":3,"title":"Warp","cx":208,"cy":473,"w":72,"h":56,"zone_name":"Warp","color":"#533483"},
      {"id":7,"zone":6,"title":"Abstraction","cx":328,"cy":473,"w":72,"h":56,"zone_name":"Abstraction","color":"#0f9b8e"},
      {"id":8,"zone":4,"title":"Gate","cx":152,"cy":613,"w":63,"h":49,"zone_name":"Gate","color":"#e94560"},
      {"id":9,"zone":5,"title":"Sink","cx":272,"cy":613,"w":63,"h":49,"zone_name":"Sink","color":"#f5a623"}
    ],
    "edges": [[0,1,"syzygy"],[2,3,"syzygy"],[4,5,"syzygy"],[6,7,"syzygy"],[8,9,"syzygy"],
              [2,1,"tree"],[4,1,"tree"],[6,1,"tree"],[8,1,"tree"],
              [5,3,"loop"],[9,7,"loop"]],
    "syzygy_pairs": [[1,8],[2,7],[3,6],[4,5],[0,9]],
    "statistics": {"total_rooms":10,"total_edges":11,"syzygy_pairs_generated":5,
                   "zone_counts":{"0":1,"1":1,"2":1,"3":1,"4":1,"5":1,"6":1,"7":1,"8":1,"9":1},
                   "pair_sums":[9,9,9,9,9],"theorem_check":"PASS",
                   "edge_type_distribution":{"syzygy":5,"tree":4,"loop":2},"connectivity":"tree+loops"},
    "theorem":"Every syzygy zone pair sums to 9 (Plex)"
  };

  DUNGEONS.torque = {
    "rooms": [
      {"id":0,"zone":1,"title":"Surge","cx":423,"cy":168,"w":63,"h":49,"zone_name":"Surge","color":"#16213e"},
      {"id":1,"zone":8,"title":"Echo","cx":543,"cy":168,"w":63,"h":49,"zone_name":"Echo","color":"#4a90d9"},
      {"id":2,"zone":2,"title":"Time-Circuit","cx":435,"cy":319,"w":63,"h":49,"zone_name":"Time-Circuit","color":"#0f3460"},
      {"id":3,"zone":7,"title":"Rise","cx":555,"cy":319,"w":63,"h":49,"zone_name":"Rise","color":"#7b2d8e"},
      {"id":4,"zone":4,"title":"Gate","cx":355,"cy":470,"w":63,"h":49,"zone_name":"Gate","color":"#e94560"},
      {"id":5,"zone":5,"title":"Sink","cx":475,"cy":470,"w":63,"h":49,"zone_name":"Sink","color":"#f5a623"}
    ],
    "edges": [[0,1,"syzygy"],[2,3,"syzygy"],[4,5,"syzygy"],[0,4,"loop"]],
    "syzygy_pairs": [[1,8],[2,7],[4,5]],
    "statistics": {"total_rooms":6,"total_edges":4,"syzygy_pairs_generated":3,
                   "zone_counts":{"1":1,"2":1,"4":1,"5":1,"7":1,"8":1},
                   "pair_sums":[9,9,9],"theorem_check":"PASS",
                   "edge_type_distribution":{"syzygy":3,"loop":1},"connectivity":"tree+loops"},
    "theorem":"Every syzygy zone pair sums to 9 (Plex)"
  };

  DUNGEONS.warp_plex = {
    "rooms": [
      {"id":0,"zone":0,"title":"Void","cx":400,"cy":360,"w":90,"h":70,"zone_name":"Void","color":"#1a1a2e"},
      {"id":1,"zone":9,"title":"Plex","cx":560,"cy":360,"w":90,"h":70,"zone_name":"Plex","color":"#00d4ff"},
      {"id":2,"zone":3,"title":"Warp","cx":256,"cy":260,"w":72,"h":56,"zone_name":"Warp","color":"#533483"},
      {"id":3,"zone":6,"title":"Abstraction","cx":376,"cy":260,"w":72,"h":56,"zone_name":"Abstraction","color":"#0f9b8e"}
    ],
    "edges": [[0,1,"syzygy"],[2,3,"syzygy"],[2,0,"tree"]],
    "syzygy_pairs": [[0,9],[3,6]],
    "statistics": {"total_rooms":4,"total_edges":3,"syzygy_pairs_generated":2,
                   "zone_counts":{"0":1,"3":1,"6":1,"9":1},
                   "pair_sums":[9,9],"theorem_check":"PASS",
                   "edge_type_distribution":{"syzygy":2,"tree":1},"connectivity":"tree"},
    "theorem":"Every syzygy zone pair sums to 9 (Plex)"
  };
}

// === SETUP ===
function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  colorMode(RGB, 255, 255, 255, 1);
  textFont('Courier New');
  loadDungeon("full");
}

// === DRAW ===
function draw() {
  background(10, 10, 20);

  if (!dungeon) return;

  // Draw edges first (under rooms)
  drawEdges();

  // Draw rooms
  drawRooms();

  // Draw labels
  drawLabels();

  // Draw HUD
  if (showInfo) drawHUD();
}

function loadDungeon(key) {
  currentDungeon = key;
  dungeon = DUNGEONS[key];
  // Build room cache
  for (let r of dungeon.rooms) {
    roomCache[r.id] = r;
  }
}

function drawEdges() {
  for (let [a_id, b_id, etype] of dungeon.edges) {
    let ra = roomCache[a_id];
    let rb = roomCache[b_id];
    if (!ra || !rb) continue;

    let col = EDGE_COLORS[etype] || "rgba(128,128,160,0.3)";
    let weight = etype === "syzygy" ? 2.5 : etype === "loop" ? 1.5 : 1;

    // Syzygy edges get a glow
    if (etype === "syzygy") {
      stroke(0, 212, 255, 35);
      strokeWeight(weight + 4);
      line(ra.cx, ra.cy, rb.cx, rb.cy);
    }

    // Draw the edge
    let [r, g, b, a] = parseRGBA(col);
    stroke(r, g, b, a * 255);
    strokeWeight(weight);
    line(ra.cx, ra.cy, rb.cx, rb.cy);

    // Midpoint label for syzygy edges
    if (etype === "syzygy") {
      let mx = (ra.cx + rb.cx) / 2;
      let my = (ra.cy + rb.cy) / 2;
      noStroke();
      fill(0, 212, 255, 180);
      textAlign(CENTER, CENTER);
      textSize(10);
      // Show the carrier current number
      let pair = [ra.zone, rb.zone].sort((a,b)=>a-b);
      let sum = pair[0] + pair[1];
      text("↕", mx, my);
    }
  }
}

function drawRooms() {
  for (let r of dungeon.rooms) {
    let isHovered = hoveredRoom === r.id;
    let zone = r.zone;

    // Room body
    let col = ZC[zone] || "#333";
    let [cr, cg, cb] = hexToRGB(col);

    if (isHovered) {
      // Brighten on hover
      cr = min(255, cr + 60);
      cg = min(255, cg + 60);
      cb = min(255, cb + 60);
    }

    // Room fill
    fill(cr, cg, cb, isHovered ? 230 : 200);
    stroke(cr, cg, cb, 180);
    strokeWeight(1.5);
    rectMode(CENTER);
    rect(r.cx, r.cy, r.w, r.h, 6);

    // Zone number in top-left corner
    fill(255, 255, 255, 200);
    noStroke();
    textAlign(LEFT, TOP);
    textSize(9);
    text("Z" + zone, r.cx - r.w/2 + 6, r.cy - r.h/2 + 4);

    // Zone name inside
    fill(255, 255, 255, isHovered ? 255 : 140);
    textAlign(CENTER, CENTER);
    textSize(isHovered ? 13 : 11);
    text(r.title, r.cx, r.cy);

    // Plex room gets a special glow
    if (zone === 9 && !isHovered) {
      noFill();
      stroke(0, 212, 255, 25);
      strokeWeight(4);
      rect(r.cx, r.cy, r.w + 4, r.h + 4, 8);
    }

    // Void room gets a subtle dark halo
    if (zone === 0 && !isHovered) {
      noFill();
      stroke(26, 26, 46, 40);
      strokeWeight(3);
      rect(r.cx, r.cy, r.w + 2, r.h + 2, 7);
    }
  }
}

function drawLabels() {
  // Draw syzygy pair labels
  for (let pair of dungeon.syzygy_pairs) {
    let [z1, z2] = pair;
    if (z1 > z2) [z1, z2] = [z2, z1];
    // Find the two rooms
    let r1 = dungeon.rooms.find(r => r.zone === z1);
    let r2 = dungeon.rooms.find(r => r.zone === z2);
    if (!r1 || !r2) continue;

    // Draw a bracket connecting the pair
    let mx = (r1.cx + r2.cx) / 2;
    let my = (r1.cy + r2.cy) / 2;

    noFill();
    stroke(0, 212, 255, 40);
    strokeWeight(1);
    // Dashed bracket
    drawingContext.setLineDash([4, 6]);
    let bx = r1.cx < r2.cx ? r1.cx - r1.w/2 - 14 : r1.cx + r1.w/2 + 14;
    let by1 = r1.cy;
    let by2 = r2.cy;
    line(bx, by1, bx, by2);
    drawingContext.setLineDash([]);

    // Syzygy notation
    fill(0, 212, 255, 100);
    noStroke();
    textAlign(CENTER, CENTER);
    textSize(9);
  }
}

function drawHUD() {
  let stats = dungeon.statistics;
  let infoEl = document.getElementById('info');
  if (infoEl) {
    let pairNames = dungeon.syzygy_pairs.map(p => {
      let [a,b] = p;
      if (a>1) [a,b]=[b,a];
      return `${a}↔${b}`;
    }).join(' ');
    infoEl.innerHTML =
      `<b style="color:#00d4ff">SYZYGY DUNGEON</b> <span style="color:#556">— ${dungeon.theorem}</span><br>` +
      `Rooms: <b>${stats.total_rooms}</b> &nbsp; Edges: <b>${stats.total_edges}</b> &nbsp; ` +
      `Syzygy: <b style="color:#0f0">${stats.theorem_check}</b><br>` +
      `Pairs: ${pairNames}<br>` +
      `Edges: <span style="color:#0df">syzygy ${stats.edge_type_distribution.syzygy||0}</span> · ` +
      `<span style="color:#aab">tree ${stats.edge_type_distribution.tree||0}</span> · ` +
      `<span style="color:#fa3">loop ${stats.edge_type_distribution.loop||0}</span>`;
  }

  let badge = document.getElementById('theorem-badge');
  if (badge) {
    badge.style.display = 'block';
  }
}

// === MOUSE INTERACTION ===
function mouseMoved() {
  if (!dungeon) return;
  let found = null;
  for (let r of dungeon.rooms) {
    if (mouseX > r.cx - r.w/2 && mouseX < r.cx + r.w/2 &&
        mouseY > r.cy - r.h/2 && mouseY < r.cy + r.h/2) {
      found = r.id;
      break;
    }
  }
  if (found !== hoveredRoom) {
    hoveredRoom = found;
  }
}

// === KEYBOARD ===
function keyPressed() {
  let active = document.activeElement;
  if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;

  if (key === '1') loadDungeon("full");
  if (key === '2') loadDungeon("torque");
  if (key === '3') loadDungeon("warp_plex");
  if (key === 'h' || key === 'H') showInfo = !showInfo;
  if (key === 's' || key === 'S') saveCanvas('syzygy-dungeon-' + currentDungeon, 'png');
  if (key === 'f') { loadDungeon("full"); }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

// === HELPERS ===
function hexToRGB(hex) {
  let h = hex.replace('#', '');
  return [
    parseInt(h.substring(0,2), 16),
    parseInt(h.substring(2,4), 16),
    parseInt(h.substring(4,6), 16)
  ];
}

function parseRGBA(str) {
  let m = str.match(/[\d.]+/g);
  if (!m || m.length < 3) return [128, 128, 160, 255];
  return [
    parseInt(m[0]), parseInt(m[1]), parseInt(m[2]),
    m.length >= 4 ? parseFloat(m[3]) * 255 : 255
  ];
}
</script>
</body>
</html>
