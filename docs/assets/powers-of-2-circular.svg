  <text x="30" y="50" fill="white" font-size="16" font-weight="700">THE 6-CYCLE</text>
  <text x="30" y="67" fill="#64748b" font-size="9">Powers of 2 (cyan, forward): 1→2→4→8→7→5→1. Powers of 5 (amber, backward): 5→7→8→4→2→1→5. Two interlocking triangles.</text>
