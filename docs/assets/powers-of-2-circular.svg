  <rect x="30" y="640" width="720" height="65" rx="6" fill="rgba(15,23,42,0.95)" stroke="#1e293b" stroke-width="1"/>
  <text x="45" y="660" fill="#94a3b8" font-size="9" font-weight="600">THE TWIN SERPENTS</text>
  <text x="45" y="678" fill="#64748b" font-size="8">Powers of 2 (cyan): 1,2,4,8,7,5 forward. Powers of 5 (amber): 5,7,8,4,2,1 backward. Same 6-cycle, opposite directions.</text>
  <text x="45" y="694" fill="#64748b" font-size="8">Two prime factors of 10 run time forever in opposed directions, neither obviously favored. — Nick Land</text>
