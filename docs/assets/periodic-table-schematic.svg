<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', monospace; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#1e3a5f"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="450" y="35" fill="#f59e0b" font-size="18" font-weight="700" text-anchor="middle">THE DECIMAL LABYRINTH</text>
  <text x="450" y="52" fill="#94a3b8" font-size="9" font-weight="400" text-anchor="middle">PERIODIC TABLE OF THE DECIMAL NUMOGRAM · CCRU PANDEMONIUM SYSTEM</text>

  <!-- ═══ TIME-CIRCUIT SECTION ═══ -->
  <rect x="50" y="75" width="800" height="170" rx="6" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4" stroke-opacity="0.5"/>
  <text x="62" y="90" fill="#22d3ee" font-size="8" font-weight="600">TIME-CIRCUIT · NORMAL TIME · ZONES 1,2,4,5,7,8</text>

  <!-- Zone 1 -->
  <g transform="translate(60, 100)">
    <rect width="140" height="130" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="70" y="28" fill="#fbbf24" font-size="28" font-weight="700" text-anchor="middle">1</text>
    <line x1="0" y1="36" x2="140" y2="36" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="70" y="52" fill="white" font-size="10" font-weight="600" text-anchor="middle">SURGE</text>
    <text x="70" y="66" fill="#94a3b8" font-size="7" text-anchor="middle">TORQUE · LUMBAR</text>
    <line x1="0" y1="74" x2="140" y2="74" stroke="#22d3ee" stroke-width="0.3" stroke-opacity="0.2"/>
    <text x="12" y="88" fill="#f59e0b" font-size="7" font-weight="600">SYZYGY</text>
    <text x="70" y="88" fill="#94a3b8" font-size="8" text-anchor="middle">1 :: 8</text>
    <text x="12" y="102" fill="#f59e0b" font-size="7" font-weight="600">CURRENT</text>
    <text x="70" y="102" fill="#94a3b8" font-size="8" text-anchor="middle">7</text>
    <text x="12" y="116" fill="#f59e0b" font-size="7" font-weight="600">CARRIER</text>
    <text x="70" y="116" fill="#94a3b8" font-size="8" text-anchor="middle">Murrumur</text>
  </g>

  <!-- Zone 2 -->
  <g transform="translate(215, 100)">
    <rect width="140" height="130" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="70" y="28" fill="#34d399" font-size="28" font-weight="700" text-anchor="middle">2</text>
    <line x1="0" y1="36" x2="140" y2="36" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="70" y="52" fill="white" font-size="10" font-weight="600" text-anchor="middle">SEPARATION</text>
    <text x="70" y="66" fill="#94a3b8" font-size="7" text-anchor="middle">TORQUE · LUMBAR</text>
    <line x1="0" y1="74" x2="140" y2="74" stroke="#22d3ee" stroke-width="0.3" stroke-opacity="0.2"/>
    <text x="12" y="88" fill="#f59e0b" font-size="7" font-weight="600">SYZYGY</text>
    <text x="70" y="88" fill="#94a3b8" font-size="8" text-anchor="middle">2 :: 7</text>
    <text x="12" y="102" fill="#f59e0b" font-size="7" font-weight="600">CURRENT</text>
    <text x="70" y="102" fill="#94a3b8" font-size="8" text-anchor="middle">5</text>
    <text x="12" y="116" fill="#f59e0b" font-size="7" font-weight="600">CARRIER</text>
    <text x="70" y="116" fill="#94a3b8" font-size="8" text-anchor="middle">Oddubb</text>
