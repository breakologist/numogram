    <text x="70" y="28" fill="#34d399" font-size="28" font-weight="700" text-anchor="middle">5</text>
    <line x1="0" y1="36" x2="140" y2="36" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="70" y="52" fill="white" font-size="10" font-weight="600" text-anchor="middle">PRESSURE</text>
    <text x="70" y="66" fill="#94a3b8" font-size="7" text-anchor="middle">TORQUE · CARDIAC</text>
    <line x1="0" y1="74" x2="140" y2="74" stroke="#22d3ee" stroke-width="0.3" stroke-opacity="0.2"/>
    <text x="12" y="88" fill="#f59e0b" font-size="7" font-weight="600">SYZYGY</text>
    <text x="70" y="88" fill="#94a3b8" font-size="8" text-anchor="middle">5 :: 4</text>
    <text x="12" y="102" fill="#f59e0b" font-size="7" font-weight="600">CURRENT</text>
    <text x="70" y="102" fill="#94a3b8" font-size="8" text-anchor="middle">1</text>
    <text x="12" y="116" fill="#f59e0b" font-size="7" font-weight="600">CARRIER</text>
    <text x="70" y="116" fill="#94a3b8" font-size="8" text-anchor="middle">Katak</text>
