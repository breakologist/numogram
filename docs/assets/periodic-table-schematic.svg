  <g transform="translate(535, 270)">
    <rect width="130" height="95" rx="4" fill="#0f172a" stroke="#e879f9" stroke-width="1.5"/>
    <text x="65" y="26" fill="#e879f9" font-size="24" font-weight="700" text-anchor="middle">3</text>
    <line x1="0" y1="32" x2="130" y2="32" stroke="#e879f9" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="65" y="46" fill="white" font-size="9" font-weight="600" text-anchor="middle">RELEASE</text>
    <text x="65" y="58" fill="#94a3b8" font-size="7" text-anchor="middle">WARP · SOLAR</text>
    <text x="65" y="72" fill="#94a3b8" font-size="7" text-anchor="middle">3 :: 6 · c.3 · Djynxx</text>
  </g>

  <!-- Zone 6 -->
  <g transform="translate(680, 270)">
    <rect width="130" height="95" rx="4" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="65" y="26" fill="#60a5fa" font-size="24" font-weight="700" text-anchor="middle">6</text>
    <line x1="0" y1="32" x2="130" y2="32" stroke="#60a5fa" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="65" y="46" fill="white" font-size="9" font-weight="600" text-anchor="middle">ABSTRACTION</text>
    <text x="65" y="58" fill="#94a3b8" font-size="7" text-anchor="middle">WARP · CARDIAC</text>
    <text x="65" y="72" fill="#94a3b8" font-size="7" text-anchor="middle">6 :: 3 · c.3 · Djynxx</text>
  </g>

  <!-- ═══ PLEX SECTION ═══ -->
  <rect x="525" y="390" width="305" height="130" rx="6" fill="none" stroke="#a855f7" stroke-width="1" stroke-dasharray="8,4" stroke-opacity="0.5"/>
  <text x="537" y="405" fill="#a855f7" font-size="8" font-weight="600">PLEX · OUTER-TIME BOUNDARY</text>

  <!-- Zone 0 -->
  <g transform="translate(535, 415)">
    <rect width="130" height="95" rx="4" fill="#0f172a" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="65" y="26" fill="#94a3b8" font-size="24" font-weight="700" text-anchor="middle">0</text>
    <line x1="0" y1="32" x2="130" y2="32" stroke="#94a3b8" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="65" y="46" fill="white" font-size="9" font-weight="600" text-anchor="middle">VOID</text>
    <text x="65" y="58" fill="#94a3b8" font-size="7" text-anchor="middle">PLEX · COCCYGEAL</text>
    <text x="65" y="72" fill="#94a3b8" font-size="7" text-anchor="middle">0 :: 9 · c.9 · Uttunul</text>
  </g>

  <!-- Zone 9 -->
  <g transform="translate(680, 415)">
    <rect width="130" height="95" rx="4" fill="#0f172a" stroke="#a855f7" stroke-width="1.5"/>
    <text x="65" y="26" fill="#a855f7" font-size="24" font-weight="700" text-anchor="middle">9</text>
    <line x1="0" y1="32" x2="130" y2="32" stroke="#a855f7" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="65" y="46" fill="white" font-size="9" font-weight="600" text-anchor="middle">PLEX</text>
    <text x="65" y="58" fill="#94a3b8" font-size="7" text-anchor="middle">PLEX · SACRAL</text>
    <text x="65" y="72" fill="#94a3b8" font-size="7" text-anchor="middle">9 :: 0 · c.9 · Uttunul</text>
  </g>

  <!-- ═══ LEGEND ═══ -->
  <rect x="60" y="400" width="440" height="125" rx="6" fill="rgba(15,23,42,0.9)" stroke="#1e3a5f" stroke-width="1"/>
  <text x="75" y="418" fill="#f59e0b" font-size="8" font-weight="600">KEY</text>

  <text x="75" y="438" fill="#f59e0b" font-size="7" font-weight="600">ZONE NUMBER</text>
  <text x="175" y="438" fill="#94a3b8" font-size="7">Atomic equivalent — unique decimal identity</text>

  <text x="75" y="456" fill="#f59e0b" font-size="7" font-weight="600">SYZYGY</text>
  <text x="175" y="456" fill="#94a3b8" font-size="7">Bond partner — always sums to 9</text>

  <text x="75" y="474" fill="#f59e0b" font-size="7" font-weight="600">CURRENT</text>
  <text x="175" y="474" fill="#94a3b8" font-size="7">Flow charge — difference between syzygy pair</text>

  <text x="75" y="492" fill="#f59e0b" font-size="7" font-weight="600">CARRIER</text>
  <text x="175" y="492" fill="#94a3b8" font-size="7">Binding demon — carries the syzygy</text>

  <text x="75" y="510" fill="#f59e0b" font-size="7" font-weight="600">REGION</text>
  <text x="175" y="510" fill="#94a3b8" font-size="7">Time-Circuit (cyan) · Warp (magenta) · Plex (purple)</text>

  <!-- Footer -->
  <text x="450" y="555" fill="#475569" font-size="7" text-anchor="middle">BASED ON THE CCRU PANDEMONIUM SYSTEM · ALPHANUMERIC QABBALA · THE DECIMAL LABYRINTH</text>

</svg>
