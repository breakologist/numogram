<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', monospace; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="30" fill="#94a3b8" font-size="10" font-weight="400">CHORD DIAGRAM · C(10) = 45</text>
  <text x="30" y="50" fill="white" font-size="16" font-weight="700">ALL 45 ZONE CONNECTIONS</text>
  <text x="30" y="67" fill="#64748b" font-size="9">5 syzygies (cyan) · 5 decadence (amber) · 35 other (dim) · pentagram pattern</text>

  <!-- ═══ ZONE POSITIONS ON CIRCLE ═══ -->
  <!-- Center: (350, 340), radius: 220 -->
  <!-- Zones 0-9 evenly spaced, starting at top (angle -90°) -->

  <!-- Chords (drawn first, behind nodes) -->
  <!-- 45 chords connecting all pairs. Syzygy= cyan, Decadence=amber, Other=very dim -->

  <!-- OTHER PAIRS (35 chords) — very dim -->
  <g stroke="#475569" stroke-width="0.5" stroke-opacity="0.15" fill="none">
    <!-- 0::1 --> <line x1="350" y1="120" x2="485" y2="162"/>
    <!-- 0::2 --> <line x1="350" y1="120" x2="566" y2="262"/>
    <!-- 0::3 --> <line x1="350" y1="120" x2="570" y2="418"/>
    <!-- 0::4 --> <line x1="350" y1="120" x2="488" y2="540"/>
    <!-- 0::5 --> <line x1="350" y1="120" x2="350" y2="560"/>
    <!-- 0::6 --> <line x1="350" y1="120" x2="212" y2="540"/>
    <!-- 0::7 --> <line x1="350" y1="120" x2="130" y2="418"/>
    <!-- 0::8 --> <line x1="350" y1="120" x2="134" y2="262"/>
    <!-- 0::9 — SYZYGY, drawn separately -->
    <!-- 1::2 --> <line x1="485" y1="162" x2="566" y2="262"/>
    <!-- 1::3 --> <line x1="485" y1="162" x2="570" y2="418"/>
    <!-- 1::4 --> <line x1="485" y1="162" x2="488" y2="540"/>
    <!-- 1::5 --> <line x1="485" y1="162" x2="350" y2="560"/>
    <!-- 1::6 --> <line x1="485" y1="162" x2="212" y2="540"/>
    <!-- 1::7 --> <line x1="485" y1="162" x2="130" y2="418"/>
    <!-- 1::8 — SYZYGY -->
    <!-- 1::9 — DECADENCE -->
    <!-- 2::3 --> <line x1="566" y1="262" x2="570" y2="418"/>
    <!-- 2::4 --> <line x1="566" y1="262" x2="488" y2="540"/>
    <!-- 2::5 --> <line x1="566" y1="262" x2="350" y2="560"/>
    <!-- 2::6 --> <line x1="566" y1="262" x2="212" y2="540"/>
    <!-- 2::7 — SYZYGY -->
    <!-- 2::8 — DECADENCE -->
    <!-- 2::9 --> <line x1="566" y1="262" x2="134" y2="178"/>
    <!-- 3::4 --> <line x1="570" y1="418" x2="488" y2="540"/>
    <!-- 3::5 --> <line x1="570" y1="418" x2="350" y2="560"/>
    <!-- 3::6 — SYZYGY -->
    <!-- 3::7 — DECADENCE -->
    <!-- 3::8 --> <line x1="570" y1="418" x2="134" y2="262"/>
    <!-- 3::9 --> <line x1="570" y1="418" x2="134" y2="178"/>
    <!-- 4::5 — SYZYGY -->
    <!-- 4::6 — DECADENCE -->
    <!-- 4::7 --> <line x1="488" y1="540" x2="130" y2="418"/>
    <!-- 4::8 --> <line x1="488" y1="540" x2="134" y2="262"/>
    <!-- 4::9 --> <line x1="488" y1="540" x2="134" y2="178"/>
    <!-- 5::6 --> <line x1="350" y1="560" x2="212" y2="540"/>
    <!-- 5::7 --> <line x1="350" y1="560" x2="130" y2="418"/>
    <!-- 5::8 --> <line x1="350" y1="560" x2="134" y2="262"/>
    <!-- 5::9 --> <line x1="350" y1="560" x2="134" y2="178"/>
    <!-- 6::7 --> <line x1="212" y1="540" x2="130" y2="418"/>
    <!-- 6::8 --> <line x1="212" y1="540" x2="134" y2="262"/>
    <!-- 6::9 --> <line x1="212" y1="540" x2="134" y2="178"/>
    <!-- 7::8 --> <line x1="130" y1="418" x2="134" y2="262"/>
    <!-- 7::9 --> <line x1="130" y1="418" x2="134" y2="178"/>
    <!-- 8::9 — SYZYGY -->
  </g>

  <!-- DECADENCE CHORDS (amber, 5 chords) -->
  <g stroke="#fbbf24" stroke-width="2" stroke-opacity="0.6" fill="none">
    <!-- 1::9 --> <line x1="485" y1="162" x2="134" y2="178"/>
    <!-- 2::8 --> <line x1="566" y1="262" x2="134" y2="262"/>
    <!-- 3::7 --> <line x1="570" y1="418" x2="130" y2="418"/>
    <!-- 4::6 --> <line x1="488" y1="540" x2="212" y2="540"/>
    <!-- 5::5 — self, no chord (diagonal) -->
  </g>

  <!-- SYZYGY CHORDS (cyan, bright, 5 chords — pentagram) -->
  <g stroke="#22d3ee" stroke-width="3" stroke-opacity="0.9" fill="none">
    <!-- 0::9 --> <line x1="350" y1="120" x2="134" y2="178"/>
    <!-- 1::8 --> <line x1="485" y1="162" x2="134" y2="262"/>
    <!-- 2::7 --> <line x1="566" y1="262" x2="130" y2="418"/>
    <!-- 3::6 --> <line x1="570" y1="418" x2="212" y2="540"/>
    <!-- 4::5 --> <line x1="488" y1="540" x2="350" y2="560"/>
  </g>

  <!-- ═══ ZONE NODES ═══ -->
  <!-- Radius 220, center (350, 340), 10 zones -->

  <!-- Zone 0 (top) -->
  <circle cx="350" cy="120" r="22" fill="#0f172a" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="350" y="125" fill="#94a3b8" font-size="14" font-weight="700" text-anchor="middle">0</text>
  <text x="350" y="100" fill="#94a3b8" font-size="8" font-weight="600" text-anchor="middle">VOID</text>

  <!-- Zone 1 -->
  <circle cx="485" cy="162" r="22" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="485" y="167" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">1</text>
  <text x="510" y="148" fill="#fbbf24" font-size="8" font-weight="600">SURGE</text>

  <!-- Zone 2 -->
  <circle cx="566" cy="262" r="22" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <text x="566" y="267" fill="#34d399" font-size="14" font-weight="700" text-anchor="middle">2</text>
  <text x="592" y="252" fill="#34d399" font-size="8" font-weight="600">SEPARATION</text>

  <!-- Zone 3 -->
  <circle cx="570" cy="418" r="22" fill="#0f172a" stroke="#e879f9" stroke-width="1.5"/>
  <text x="570" y="423" fill="#e879f9" font-size="14" font-weight="700" text-anchor="middle">3</text>
  <text x="596" y="415" fill="#e879f9" font-size="8" font-weight="600">RELEASE</text>

  <!-- Zone 4 -->
  <circle cx="488" cy="540" r="22" fill="#0f172a" stroke="#00ffff" stroke-width="1.5"/>
  <text x="488" y="545" fill="#00ffff" font-size="14" font-weight="700" text-anchor="middle">4</text>
  <text x="514" y="566" fill="#00ffff" font-size="8" font-weight="600">GATE</text>

  <!-- Zone 5 (bottom) -->
  <circle cx="350" cy="560" r="22" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <text x="350" y="565" fill="#34d399" font-size="14" font-weight="700" text-anchor="middle">5</text>
  <text x="350" y="592" fill="#34d399" font-size="8" font-weight="600" text-anchor="middle">PRESSURE</text>

  <!-- Zone 6 -->
  <circle cx="212" cy="540" r="22" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="212" y="545" fill="#60a5fa" font-size="14" font-weight="700" text-anchor="middle">6</text>
  <text x="186" y="566" fill="#60a5fa" font-size="8" font-weight="600">ABSTRACTION</text>

  <!-- Zone 7 -->
  <circle cx="130" cy="418" r="22" fill="#0f172a" stroke="#fb7185" stroke-width="1.5"/>
  <text x="130" y="423" fill="#fb7185" font-size="14" font-weight="700" text-anchor="middle">7</text>
  <text x="104" y="415" fill="#fb7185" font-size="8" font-weight="600">BLOOD</text>

  <!-- Zone 8 -->
  <circle cx="134" cy="262" r="22" fill="#0f172a" stroke="#c084fc" stroke-width="1.5"/>
  <text x="134" y="267" fill="#c084fc" font-size="14" font-weight="700" text-anchor="middle">8</text>
  <text x="108" y="252" fill="#c084fc" font-size="8" font-weight="600">MULTIPLICITY</text>

  <!-- Zone 9 (Plex, left of center) -->
  <circle cx="134" cy="178" r="22" fill="#0f172a" stroke="#a855f7" stroke-width="1.5"/>
  <text x="134" y="183" fill="#a855f7" font-size="14" font-weight="700" text-anchor="middle">9</text>
  <text x="108" y="168" fill="#a855f7" font-size="8" font-weight="600">PLEX</text>

  <!-- ═══ SYZYGY LABELS ON CHORDS ═══ -->
  <text x="242" y="150" fill="#22d3ee" font-size="8" font-weight="600" transform="rotate(-10,242,150)">0::9</text>
  <text x="310" y="215" fill="#22d3ee" font-size="8" font-weight="600" transform="rotate(10,310,215)">1::8</text>
  <text x="348" y="345" fill="#22d3ee" font-size="8" font-weight="600">2::7</text>
  <text x="390" y="478" fill="#22d3ee" font-size="8" font-weight="600" transform="rotate(-15,390,478)">3::6</text>
  <text x="420" y="552" fill="#22d3ee" font-size="8" font-weight="600">4::5</text>

  <!-- DECADENCE LABELS -->
  <text x="310" y="170" fill="#fbbf24" font-size="7" transform="rotate(-8,310,170)">1↔9</text>
  <text x="350" y="262" fill="#fbbf24" font-size="7">2↔8</text>
  <text x="350" y="418" fill="#fbbf24" font-size="7">3↔7</text>
  <text x="350" y="540" fill="#fbbf24" font-size="7">4↔6</text>

  <!-- ═══ CENTER LABEL ═══ -->
  <text x="350" y="335" fill="#475569" font-size="10" font-weight="600" text-anchor="middle">C(10,2)</text>
  <text x="350" y="350" fill="#475569" font-size="18" font-weight="700" text-anchor="middle">= 45</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="620" y="100" width="160" height="170" rx="6" fill="rgba(15,23,42,0.95)" stroke="#1e293b" stroke-width="1"/>
  <text x="635" y="120" fill="#94a3b8" font-size="9" font-weight="600">LEGEND</text>

  <line x1="635" y1="138" x2="665" y2="138" stroke="#22d3ee" stroke-width="3" stroke-opacity="0.9"/>
  <text x="675" y="142" fill="#22d3ee" font-size="8">SYZYGY (sum=9)</text>
  <text x="635" y="158" fill="#64748b" font-size="7">Pentagram pattern — 5 chords</text>

  <line x1="635" y1="174" x2="665" y2="174" stroke="#fbbf24" stroke-width="2" stroke-opacity="0.6"/>
  <text x="675" y="178" fill="#fbbf24" font-size="8">DECADENCE (sum=10)</text>
  <text x="635" y="194" fill="#64748b" font-size="7">Cross pattern — 4 chords</text>

  <line x1="635" y1="210" x2="665" y2="210" stroke="#475569" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="675" y="214" fill="#94a3b8" font-size="8">OTHER (35 chords)</text>

  <text x="635" y="240" fill="#475569" font-size="7">Syzygies form a</text>
  <text x="635" y="252" fill="#475569" font-size="7">pentagram (5-point star)</text>
  <text x="635" y="268" fill="#475569" font-size="7">Decadence forms a</text>
  <text x="635" y="280" fill="#475569" font-size="7">cross (4 spokes)</text>

</svg>
