<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 680">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-magenta" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e879f9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="35" fill="#94a3b8" font-size="10" font-weight="400">ARCHITECTURE · TOPOLOGY</text>
  <text x="30" y="55" fill="white" font-size="16" font-weight="700">THE DECIMAL LABYRINTH</text>
  <text x="30" y="72" fill="#64748b" font-size="9" font-weight="400">10 zones · 3 regions · 5 syzygies · 5 currents</text>

  <!-- ═══ NODE POSITIONS (R=175, center 410,400) ═══
       1:(235,400) 8:(322,248) 2:(498,248) 7:(585,400) 5:(498,552) 4:(322,552)
  ═══════════════════════════════════════════ -->

  <!-- ═══ REGION BOUNDARIES ═══ -->

  <!-- Plex region -->
  <rect x="330" y="72" width="160" height="72" rx="10" fill="none" stroke="#a855f7" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="340" y="86" fill="#a855f7" font-size="7" font-weight="600">PLEX · OUTER-TIME</text>

  <!-- Time-Circuit hexagon boundary -->
  <polygon points="235,400 322,248 498,248 585,400 498,552 322,552" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4" stroke-opacity="0.5"/>
  <text x="330" y="242" fill="#22d3ee" font-size="7" font-weight="600">TIME-CIRCUIT</text>

  <!-- Warp region -->
  <rect x="300" y="586" width="220" height="68" rx="10" fill="none" stroke="#e879f9" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="310" y="600" fill="#e879f9" font-size="7" font-weight="600">WARP · UPPER-CHAOS</text>

  <!-- ═══ SYZYGY CONNECTIONS (dashed) ═══ -->

  <!-- 0::9 -->
  <line x1="390" y1="118" x2="430" y2="118" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3" stroke-opacity="0.5"/>
  <text x="410" y="110" fill="#a855f7" font-size="7" font-weight="500" text-anchor="middle">0::9</text>

  <!-- 1::8 -->
  <line x1="247" y1="378" x2="310" y2="270" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.3"/>

  <!-- 2::7 -->
  <line x1="510" y1="270" x2="573" y2="378" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.3"/>

  <!-- 4::5 -->
  <line x1="344" y1="552" x2="476" y2="552" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.3"/>

  <!-- 3::6 -->
  <line x1="372" y1="620" x2="448" y2="620" stroke="#e879f9" stroke-width="1.5" stroke-dasharray="4,3" stroke-opacity="0.5"/>
  <text x="410" y="635" fill="#e879f9" font-size="7" font-weight="500" text-anchor="middle">3::6</text>

  <!-- ═══ TIME-CIRCUIT PATH (anti-clockwise) ═══ -->

  <!-- 1→8 -->
  <path d="M 250 378 L 300 270" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" stroke-opacity="0.7"/>

  <!-- 8→2 -->
  <path d="M 344 248 L 476 248" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" stroke-opacity="0.7"/>
  <text x="410" y="241" fill="#64748b" font-size="6" text-anchor="middle">current 5</text>

  <!-- 2→7 -->
  <path d="M 520 270 L 570 378" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" stroke-opacity="0.7"/>

  <!-- 7→5 -->
  <path d="M 570 422 L 520 530" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" stroke-opacity="0.7"/>

  <!-- 5→4 -->
  <path d="M 476 552 L 344 552" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" stroke-opacity="0.7"/>
  <text x="410" y="565" fill="#64748b" font-size="6" text-anchor="middle">current 1</text>

  <!-- 4→1 (closes circuit) -->
  <path d="M 300 530 L 250 422" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" stroke-opacity="0.5"/>

  <!-- ═══ WARP CONNECTION ═══ -->
  <path d="M 372 620 L 448 620" fill="none" stroke="#e879f9" stroke-width="1.5" marker-end="url(#arrow-magenta)" stroke-opacity="0.7"/>
  <text x="410" y="652" fill="#c084fc" font-size="6" text-anchor="middle">current 3</text>

  <!-- ═══ ZONE NODES ═══ -->

  <!-- Zone 0 — Void (Plex) -->
  <rect x="338" y="92" width="110" height="48" rx="6" fill="#0f172a"/>
  <rect x="338" y="92" width="110" height="48" rx="6" fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="370" y="114" fill="#94a3b8" font-size="14" font-weight="700">0</text>
  <text x="398" y="114" fill="white" font-size="10" font-weight="600">VOID</text>
  <text x="393" y="130" fill="#64748b" font-size="7" text-anchor="middle">zero-return</text>

  <!-- Zone 9 — Plex -->
  <rect x="338" y="130" width="110" height="48" rx="6" fill="#0f172a"/>
  <rect x="338" y="130" width="110" height="48" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a855f7" stroke-width="1.5"/>
  <text x="370" y="152" fill="#a855f7" font-size="14" font-weight="700">9</text>
  <text x="398" y="152" fill="white" font-size="10" font-weight="600">PLEX</text>
  <text x="393" y="168" fill="#64748b" font-size="7" text-anchor="middle">terminal involution</text>
  <text x="456" y="128" fill="#a855f7" font-size="7">Uttunul</text>

  <!-- Zone 1 — Surge (left) -->
  <rect x="180" y="376" width="110" height="48" rx="6" fill="#0f172a"/>
  <rect x="180" y="376" width="110" height="48" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="212" y="398" fill="#fbbf24" font-size="14" font-weight="700">1</text>
  <text x="240" y="398" fill="white" font-size="10" font-weight="600">SURGE</text>
  <text x="235" y="414" fill="#64748b" font-size="7" text-anchor="middle">first movement</text>

  <!-- Zone 8 — Multiplicity (upper-left) -->
  <rect x="267" y="224" width="110" height="48" rx="6" fill="#0f172a"/>
  <rect x="267" y="224" width="110" height="48" rx="6" fill="rgba(76,29,149,0.3)" stroke="#c084fc" stroke-width="1.5"/>
  <text x="299" y="246" fill="#c084fc" font-size="14" font-weight="700">8</text>
  <text x="327" y="246" fill="white" font-size="10" font-weight="600">MULTIPLICITY</text>
  <text x="322" y="262" fill="#64748b" font-size="7" text-anchor="middle">cavernous</text>
  <text x="200" y="248" fill="#c084fc" font-size="7">Murrumur</text>

  <!-- Zone 2 — Separation (upper-right) -->
  <rect x="443" y="224" width="110" height="48" rx="6" fill="#0f172a"/>
  <rect x="443" y="224" width="110" height="48" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="475" y="246" fill="#34d399" font-size="14" font-weight="700">2</text>
  <text x="503" y="246" fill="white" font-size="10" font-weight="600">SEPARATION</text>
  <text x="498" y="262" fill="#64748b" font-size="7" text-anchor="middle">doubling</text>

  <!-- Zone 7 — Blood (right) -->
  <rect x="530" y="376" width="110" height="48" rx="6" fill="#0f172a"/>
  <rect x="530" y="376" width="110" height="48" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="562" y="398" fill="#fb7185" font-size="14" font-weight="700">7</text>
  <text x="590" y="398" fill="white" font-size="10" font-weight="600">BLOOD</text>
  <text x="585" y="414" fill="#64748b" font-size="7" text-anchor="middle">pharyngeal</text>
  <text x="648" y="398" fill="#fb7185" font-size="7">Oddubb</text>

  <!-- Zone 5 — Pressure (lower-right) -->
  <rect x="443" y="528" width="110" height="48" rx="6" fill="#0f172a"/>
  <rect x="443" y="528" width="110" height="48" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="475" y="550" fill="#34d399" font-size="14" font-weight="700">5</text>
  <text x="503" y="550" fill="white" font-size="10" font-weight="600">PRESSURE</text>
  <text x="498" y="566" fill="#64748b" font-size="7" text-anchor="middle">cardiac</text>

  <!-- Zone 4 — Gate (lower-left) -->
  <rect x="267" y="528" width="110" height="48" rx="6" fill="#0f172a"/>
  <rect x="267" y="528" width="110" height="48" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="299" y="550" fill="#22d3ee" font-size="14" font-weight="700">4</text>
  <text x="327" y="550" fill="white" font-size="10" font-weight="600">GATE</text>
  <text x="322" y="566" fill="#64748b" font-size="7" text-anchor="middle">catastrophe</text>
  <text x="200" y="560" fill="#22d3ee" font-size="7">Katak</text>

  <!-- ═══ WARP NODES ═══ -->

  <!-- Zone 3 — Release -->
  <rect x="310" y="598" width="110" height="48" rx="6" fill="#0f172a"/>
  <rect x="310" y="598" width="110" height="48" rx="6" fill="rgba(76,29,149,0.4)" stroke="#e879f9" stroke-width="1.5"/>
  <text x="344" y="620" fill="#e879f9" font-size="14" font-weight="700">3</text>
  <text x="370" y="620" fill="white" font-size="10" font-weight="600">RELEASE</text>
  <text x="365" y="636" fill="#64748b" font-size="7" text-anchor="middle">solar plexus</text>

  <!-- Zone 6 — Abstraction -->
  <rect x="430" y="598" width="110" height="48" rx="6" fill="#0f172a"/>
  <rect x="430" y="598" width="110" height="48" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="464" y="620" fill="#60a5fa" font-size="14" font-weight="700">6</text>
  <text x="490" y="620" fill="white" font-size="10" font-weight="600">ABSTRACTION</text>
  <text x="485" y="636" fill="#64748b" font-size="7" text-anchor="middle">cardiac</text>
  <text x="548" y="620" fill="#60a5fa" font-size="7">Djynxx</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="620" y="90" width="170" height="195" rx="8" fill="rgba(15,23,42,0.95)" stroke="#1e293b" stroke-width="1"/>
  <text x="635" y="110" fill="#94a3b8" font-size="9" font-weight="600">LEGEND</text>

  <rect x="635" y="120" width="10" height="10" rx="2" fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1"/>
  <text x="653" y="129" fill="#94a3b8" font-size="8">PLEX (0, 9)</text>

  <rect x="635" y="138" width="10" height="10" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="653" y="147" fill="#22d3ee" font-size="8">TIME-CIRCUIT (1,2,4,5,7,8)</text>

  <rect x="635" y="156" width="10" height="10" rx="2" fill="rgba(76,29,149,0.4)" stroke="#e879f9" stroke-width="1"/>
  <text x="653" y="165" fill="#e879f9" font-size="8">WARP (3, 6)</text>

  <line x1="635" y1="183" x2="660" y2="183" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="668" y="187" fill="#94a3b8" font-size="8">SYZYGY</text>

  <line x1="635" y1="201" x2="660" y2="201" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="668" y="205" fill="#94a3b8" font-size="8">CURRENT</text>

  <text x="635" y="226" fill="#64748b" font-size="7">CARRIERS: Uttunul · Murrumur</text>
  <text x="635" y="238" fill="#64748b" font-size="7">Oddubb · Djynxx · Katak</text>
  <text x="635" y="258" fill="#475569" font-size="7">Traversal: 1→8→2→7→5→4→1</text>

</svg>
