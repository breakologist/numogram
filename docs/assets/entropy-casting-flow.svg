<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', monospace; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="30" y="30" fill="#94a3b8" font-size="10" font-weight="400">DATA FLOW · ENTROPY CASTING</text>
  <text x="30" y="50" fill="white" font-size="16" font-weight="700">ENTROPY → HEXAGRAM → ZONE → DEMON</text>
  <text x="30" y="67" fill="#64748b" font-size="9">Hardware noise digested through I Ching casting into numogram traversal</text>

  <!-- ═══ FLOW ARROWS ═══ -->
  <!-- 1→2 -->
  <line x1="190" y1="155" x2="250" y2="155" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 2→3 -->
  <line x1="410" y1="155" x2="470" y2="155" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 3→4 -->
  <line x1="630" y1="155" x2="690" y2="155" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 4→5 -->
  <line x1="760" y1="190" x2="760" y2="260" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <!-- 5→6 -->
  <line x1="760" y1="320" x2="760" y2="360" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <!-- ═══ STAGE 1: ENTROPY SOURCE ═══ -->
  <rect x="30" y="110" width="160" height="90" rx="8" fill="rgba(15,23,42,0.9)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="110" y="135" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">ENTROPY SOURCE</text>
  <text x="110" y="155" fill="#94a3b8" font-size="8" text-anchor="middle">/dev/urandom</text>
  <text x="110" y="170" fill="#94a3b8" font-size="8" text-anchor="middle">thermal · CPU · GPU</text>
  <text x="110" y="185" fill="#64748b" font-size="7" text-anchor="middle">6 bytes → 6 lines</text>

  <!-- ═══ STAGE 2: I CHING CAST ═══ -->
  <rect x="250" y="110" width="160" height="90" rx="8" fill="rgba(15,23,42,0.9)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="330" y="135" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">I CHING CAST</text>
  <text x="330" y="155" fill="#94a3b8" font-size="8" text-anchor="middle">byte % 4 → line value</text>
  <text x="330" y="170" fill="#94a3b8" font-size="8" text-anchor="middle">0→6, 1→7, 2→8, 3→9</text>
  <text x="330" y="185" fill="#64748b" font-size="7" text-anchor="middle">6 lines → hexagram</text>

  <!-- ═══ STAGE 3: HEXAGRAM ═══ -->
  <rect x="470" y="110" width="160" height="90" rx="8" fill="rgba(15,23,42,0.9)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="550" y="135" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">HEXAGRAM</text>
  <text x="550" y="155" fill="#94a3b8" font-size="8" text-anchor="middle">64 possibilities</text>
  <text x="550" y="170" fill="#94a3b8" font-size="8" text-anchor="middle">binary → decimal</text>
  <text x="550" y="185" fill="#64748b" font-size="7" text-anchor="middle">King Wen #</text>

  <!-- ═══ STAGE 4: DIGITAL ROOT ═══ -->
  <rect x="690" y="110" width="100" height="90" rx="8" fill="rgba(15,23,42,0.9)" stroke="#a855f7" stroke-width="1.5"/>
  <text x="740" y="135" fill="#a855f7" font-size="11" font-weight="600" text-anchor="middle">ZONE</text>
  <text x="740" y="155" fill="#94a3b8" font-size="8" text-anchor="middle">(hex-1) mod 9</text>
  <text x="740" y="170" fill="#94a3b8" font-size="8" text-anchor="middle">10 zones</text>
  <text x="740" y="185" fill="#64748b" font-size="7" text-anchor="middle">0-9</text>

  <!-- ═══ STAGE 5: SYZYGY ═══ -->
  <rect x="680" y="265" width="160" height="55" rx="8" fill="rgba(15,23,42,0.9)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="760" y="287" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">SYZYGY</text>
  <text x="760" y="305" fill="#94a3b8" font-size="8" text-anchor="middle">9 - zone → partner</text>

  <!-- ═══ STAGE 6: DEMON ═══ -->
  <rect x="680" y="345" width="160" height="45" rx="8" fill="rgba(15,23,42,0.9)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="760" y="372" fill="#fb7185" font-size="11" font-weight="600" text-anchor="middle">DEMON (45)</text>

  <!-- ═══ ARROW LABELS ═══ -->
  <text x="220" y="145" fill="#64748b" font-size="7" text-anchor="middle">6 bytes</text>
  <text x="440" y="145" fill="#64748b" font-size="7" text-anchor="middle">lines</text>
  <text x="660" y="145" fill="#64748b" font-size="7" text-anchor="middle">decimal</text>
  <text x="775" y="230" fill="#64748b" font-size="7">DR</text>
  <text x="775" y="345" fill="#64748b" font-size="7">sum=9</text>

  <!-- ═══ CONVERGENCE NOTE ═══ -->
  <rect x="30" y="240" width="620" height="140" rx="8" fill="rgba(15,23,42,0.9)" stroke="#1e293b" stroke-width="1"/>
  <text x="45" y="262" fill="#94a3b8" font-size="9" font-weight="600">CONVERGENCE</text>
  <text x="45" y="282" fill="#64748b" font-size="8">First 1-2 zones carry hardware entropy (true noise).</text>
  <text x="45" y="298" fill="#64748b" font-size="8">Later zones collapse to structural attractors (Warp 3::6, Plex 0::9).</text>
  <text x="45" y="314" fill="#64748b" font-size="8">The numogram digests chaos. The first zones are the meal. The later zones are the digestion.</text>
  <text x="45" y="340" fill="#475569" font-size="7">Observed: Zones 4 (Closure) and 6 (Warp) dominate in hardware entropy casting.</text>
  <text x="45" y="356" fill="#475569" font-size="7">4 of 10 casts landed on Zone 6. The Warp is the numogram's preferred attractor.</text>

</svg>
