  <rect width="100%" height="100%" fill="#0f172a"/>
  <text x="450" y="35" class="title" text-anchor="middle">BARKER SPIRAL (Diplozygotic)</text>
  <circle cx="450" cy="320" r="8" class="center-dot"/>
  <text x="470" y="324" class="label" fill="#fbbf24">5 ⊕ 5 = 10 (axis origin)</text>
