  <rect x="427.6698729810778" y="305.5" width="36" height="24" class="num-bg lem-bg"/>
  <text x="445.6698729810778" y="322.5" text-anchor="middle" class="pair">9</text>
  <rect x="427.6698729810778" y="310.5" width="36" height="24" class="num-bg lem-bg"/>
  <text x="445.6698729810778" y="327.5" text-anchor="middle" class="pair">0</text>
  <line x1="450" y1="20" x2="450" y2="580" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5 5"/>
  <text x="20" y="300" class="label" fill="#60a5fa">Atlantean
(decadence)</text>
  <text x="880" y="300" class="label" fill="#a78bfa" text-anchor="end">Lemurian
(subdecadence)</text>
  <path d="M 380 320 Q 450 180 520 320 Q 450 460 380 320" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4 2" opacity="0.7"/>
  <text x="530" y="295" fill="#fbbf24" font-size="10" class="label">spiral tension</text>
  <rect x="120" y="520" width="660" height="60" fill="#1e293b" stroke="#334155" rx="8"/>
  <text x="450" y="545" class="label" text-anchor="middle">
    Spiral emerges from Lemuro-Atlantean convergence; the friction between sum-to-10 and sum-to-9
    opens the infinitesimal gap where 0.999… → 1. The Numogram lives in that gap.
  </text>
</svg>