  <circle cx="450" cy="320" r="110" fill="none" stroke="#334155" stroke-width="0.5" stroke-dasharray="3 3"/>
  <circle cx="450" cy="320" r="170" fill="none" stroke="#334155" stroke-width="0.5" stroke-dasharray="3 3"/>
  <circle cx="450" cy="320" r="240" fill="none" stroke="#334155" stroke-width="0.5" stroke-dasharray="3 3"/>
  <circle cx="450" cy="320" r="320" fill="none" stroke="#334155" stroke-width="0.5" stroke-dasharray="3 3"/>
  <!-- Atlantean (sum-to-10) -->
  <line x1="450" y1="320" x2="449.1339745962156" y2="320.5" class="conn atlantean"/>
