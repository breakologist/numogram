  <!-- Lemurian (sum-to-9) -->
  <line x1="450" y1="320" x2="450.8660254037844" y2="319.5" class="conn lemurian"/>
  <line x1="450" y1="320" x2="450.8660254037844" y2="320.5" class="conn lemurian"/>
  <rect x="432.8660254037844" y="307.5" width="36" height="24" class="num-bg lem-bg"/>
