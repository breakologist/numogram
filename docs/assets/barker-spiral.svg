  <rect x="433.0" y="309.7320508075689" width="36" height="24" class="num-bg lem-bg"/>
  <text x="451.0" y="326.7320508075689" text-anchor="middle" class="pair">7</text>
  <line x1="450" y1="320" x2="450.0" y2="317.0" class="conn lemurian"/>
  <line x1="450" y1="320" x2="450.0" y2="323.0" class="conn lemurian"/>
  <rect x="432.0" y="305.0" width="36" height="24" class="num-bg lem-bg"/>
  <text x="450.0" y="322.0" text-anchor="middle" class="pair">3</text>
  <rect x="432.0" y="311.0" width="36" height="24" class="num-bg lem-bg"/>
