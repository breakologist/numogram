<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 680">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', monospace; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="30" fill="#94a3b8" font-size="10" font-weight="400">CHORD DIAGRAM · C(10) = 45 · PENTAGRAM STRUCTURE</text>
  <text x="30" y="50" fill="white" font-size="16" font-weight="700">THE NUMOGRAM STAR</text>
  <text x="30" y="67" fill="#64748b" font-size="9">Syzygy pentagram (cyan) · Decadence cross (amber) · 5 outer zones at star points · 5 inner zones at valleys</text>

  <!-- ═══
       Outer pentagon (star points): zones 0,1,2,3,4
       Center (400, 330), outer radius 240
       0: (400, 90)     — top
       1: (628, 256)    — upper-right
       2: (541, 513)    — lower-right
       3: (259, 513)    — lower-left
       4: (172, 256)    — upper-left

       Inner pentagon (valleys): zones 9,8,7,6,5
       Inner radius 150, offset -36° from each outer
       9: (488, 209)    — between 0 and 1
       8: (543, 376)    — between 1 and 2
       7: (400, 480)    — between 2 and 3
       6: (257, 376)    — between 3 and 4
       5: (312, 209)    — between 4 and 0
  ═══ -->

  <!-- ═══ PENTAGRAM EDGES (the star — outer zones skipping one) ═══ -->
  <!-- 0→2→4→1→3→0 -->
  <line x1="400" y1="90" x2="541" y2="524" stroke="#22d3ee" stroke-width="2.5" stroke-opacity="0.8"/>
  <line x1="541" y1="524" x2="172" y2="256" stroke="#22d3ee" stroke-width="2.5" stroke-opacity="0.8"/>
  <line x1="172" y1="256" x2="628" y2="256" stroke="#22d3ee" stroke-width="2.5" stroke-opacity="0.8"/>
  <line x1="628" y1="256" x2="259" y2="524" stroke="#22d3ee" stroke-width="2.5" stroke-opacity="0.8"/>
  <line x1="259" y1="524" x2="400" y2="90" stroke="#22d3ee" stroke-width="2.5" stroke-opacity="0.8"/>

  <!-- ═══ INNER PENTAGON EDGES (valley zones) ═══ -->
  <!-- 9→8→7→6→5→9 -->
  <line x1="488" y1="209" x2="543" y2="376" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="543" y1="376" x2="400" y2="480" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="400" y1="480" x2="257" y2="376" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="257" y1="376" x2="312" y2="209" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="312" y1="209" x2="488" y2="209" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3"/>

  <!-- ═══ DECADENCE CHORDS (amber — crossing center) ═══ -->
  <!-- 1::9 diameter -->
  <line x1="628" y1="256" x2="312" y2="209" stroke="#fbbf24" stroke-width="2" stroke-opacity="0.5"/>
  <!-- 2::8 diameter -->
  <line x1="541" y1="524" x2="488" y2="209" stroke="#fbbf24" stroke-width="2" stroke-opacity="0.5"/>
  <!-- 3::7 diameter -->
  <line x1="259" y1="524" x2="543" y2="376" stroke="#fbbf24" stroke-width="2" stroke-opacity="0.5"/>
  <!-- 4::6 diameter -->
  <line x1="172" y1="256" x2="400" y2="480" stroke="#fbbf24" stroke-width="2" stroke-opacity="0.5"/>
  <!-- 0::9 decadence (0+9=9 is syzygy, but 0 and 9 are also decadence-adjacent in the numogram) -->
  <!-- 5::5 self-decadence — no chord (point) -->

  <!-- ═══ SYZYGY SPOKES (cyan — outer to inner, each pair) ═══ -->
  <!-- These connect each star point to its valley partner -->
  <!-- 0::9 -->
  <line x1="400" y1="90" x2="488" y2="209" stroke="#22d3ee" stroke-width="3" stroke-opacity="0.9"/>
  <!-- 1::8 -->
  <line x1="628" y1="256" x2="543" y2="376" stroke="#22d3ee" stroke-width="3" stroke-opacity="0.9"/>
  <!-- 2::7 -->
  <line x1="541" y1="524" x2="400" y2="480" stroke="#22d3ee" stroke-width="3" stroke-opacity="0.9"/>
  <!-- 3::6 -->
  <line x1="259" y1="524" x2="257" y2="376" stroke="#22d3ee" stroke-width="3" stroke-opacity="0.9"/>
  <!-- 4::5 -->
  <line x1="172" y1="256" x2="312" y2="209" stroke="#22d3ee" stroke-width="3" stroke-opacity="0.9"/>

  <!-- ═══ OTHER CHORDS (35 — very dim) ═══ -->
  <g stroke="#475569" stroke-width="0.4" stroke-opacity="0.08" fill="none">
    <line x1="400" y1="90" x2="628" y2="256"/>
    <line x1="400" y1="90" x2="541" y2="524"/>
    <line x1="400" y1="90" x2="259" y2="524"/>
    <line x1="400" y1="90" x2="172" y2="256"/>
    <line x1="400" y1="90" x2="543" y2="376"/>
    <line x1="400" y1="90" x2="400" y2="480"/>
    <line x1="400" y1="90" x2="257" y2="376"/>
    <line x1="628" y1="256" x2="541" y2="524"/>
    <line x1="628" y1="256" x2="259" y2="524"/>
    <line x1="628" y1="256" x2="172" y2="256"/>
    <line x1="628" y1="256" x2="400" y2="480"/>
    <line x1="628" y1="256" x2="257" y2="376"/>
    <line x1="541" y1="524" x2="259" y2="524"/>
    <line x1="541" y1="524" x2="172" y2="256"/>
    <line x1="541" y1="524" x2="312" y2="209"/>
    <line x1="541" y1="524" x2="257" y2="376"/>
    <line x1="259" y1="524" x2="172" y2="256"/>
    <line x1="259" y1="524" x2="312" y2="209"/>
    <line x1="259" y1="524" x2="488" y2="209"/>
    <line x1="172" y1="256" x2="543" y2="376"/>
    <line x1="172" y1="256" x2="257" y2="376"/>
    <line x1="488" y1="209" x2="543" y2="376"/>
    <line x1="488" y1="209" x2="400" y2="480"/>
    <line x1="488" y1="209" x2="257" y2="376"/>
    <line x1="543" y1="376" x2="257" y2="376"/>
    <line x1="543" y1="376" x2="312" y2="209"/>
    <line x1="400" y1="480" x2="257" y2="376"/>
    <line x1="400" y1="480" x2="312" y2="209"/>
    <line x1="257" y1="376" x2="312" y2="209"/>
  </g>

  <!-- ═══ ZONE NODES — OUTER (star points) ═══ -->

  <!-- Zone 0 (top) -->
  <circle cx="400" cy="90" r="24" fill="#0f172a" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="400" cy="90" r="21" fill="rgba(30,41,59,0.4)"/>
  <text x="400" y="96" fill="#94a3b8" font-size="16" font-weight="700" text-anchor="middle">0</text>
  <text x="400" y="68" fill="#94a3b8" font-size="9" font-weight="600" text-anchor="middle">VOID</text>

  <!-- Zone 1 (upper-right) -->
  <circle cx="628" cy="256" r="24" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="628" cy="256" r="21" fill="rgba(120,53,15,0.2)"/>
  <text x="628" y="262" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">1</text>
  <text x="658" y="248" fill="#fbbf24" font-size="9" font-weight="600">SURGE</text>

  <!-- Zone 2 (lower-right) -->
  <circle cx="541" cy="524" r="24" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <circle cx="541" cy="524" r="21" fill="rgba(6,78,59,0.2)"/>
  <text x="541" y="530" fill="#34d399" font-size="16" font-weight="700" text-anchor="middle">2</text>
  <text x="570" y="551" fill="#34d399" font-size="9" font-weight="600">SEPARATION</text>

  <!-- Zone 3 (lower-left) -->
  <circle cx="259" cy="524" r="24" fill="#0f172a" stroke="#e879f9" stroke-width="2"/>
  <circle cx="259" cy="524" r="21" fill="rgba(76,29,149,0.2)"/>
  <text x="259" y="530" fill="#e879f9" font-size="16" font-weight="700" text-anchor="middle">3</text>
  <text x="230" y="551" fill="#e879f9" font-size="9" font-weight="600">RELEASE</text>

  <!-- Zone 4 (upper-left) -->
  <circle cx="172" cy="256" r="24" fill="#0f172a" stroke="#00ffff" stroke-width="2"/>
  <circle cx="172" cy="256" r="21" fill="rgba(8,51,68,0.2)"/>
  <text x="172" y="262" fill="#00ffff" font-size="16" font-weight="700" text-anchor="middle">4</text>
  <text x="142" y="248" fill="#00ffff" font-size="9" font-weight="600">GATE</text>

  <!-- ═══ ZONE NODES — INNER (valleys) ═══ -->

  <!-- Zone 9 (between 0 and 1) -->
  <circle cx="488" cy="209" r="18" fill="#0f172a" stroke="#a855f7" stroke-width="1.5"/>
  <circle cx="488" cy="209" r="15" fill="rgba(76,29,149,0.2)"/>
  <text x="488" y="214" fill="#a855f7" font-size="13" font-weight="700" text-anchor="middle">9</text>
  <text x="508" y="200" fill="#a855f7" font-size="8">PLEX</text>

  <!-- Zone 8 (between 1 and 2) -->
  <circle cx="543" cy="376" r="18" fill="#0f172a" stroke="#c084fc" stroke-width="1.5"/>
  <circle cx="543" cy="376" r="15" fill="rgba(76,29,149,0.2)"/>
  <text x="543" y="381" fill="#c084fc" font-size="13" font-weight="700" text-anchor="middle">8</text>
  <text x="563" y="368" fill="#c084fc" font-size="8">MULTIPLICITY</text>

  <!-- Zone 7 (between 2 and 3) -->
  <circle cx="400" cy="480" r="18" fill="#0f172a" stroke="#fb7185" stroke-width="1.5"/>
  <circle cx="400" cy="480" r="15" fill="rgba(136,19,55,0.2)"/>
  <text x="400" y="485" fill="#fb7185" font-size="13" font-weight="700" text-anchor="middle">7</text>
  <text x="400" y="517" fill="#fb7185" font-size="8" text-anchor="middle">BLOOD</text>

  <!-- Zone 6 (between 3 and 4) -->
  <circle cx="257" cy="376" r="18" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5"/>
  <circle cx="257" cy="376" r="15" fill="rgba(59,130,246,0.2)"/>
  <text x="209" y="408" fill="#60a5fa" font-size="13" font-weight="700" text-anchor="middle">6</text>
  <text x="237" y="368" fill="#60a5fa" font-size="8">ABSTRACTION</text>

  <!-- Zone 5 (between 4 and 0) -->
  <circle cx="312" cy="209" r="18" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="312" cy="209" r="15" fill="rgba(6,78,59,0.2)"/>
  <text x="312" y="214" fill="#34d399" font-size="13" font-weight="700" text-anchor="middle">5</text>
  <text x="292" y="200" fill="#34d399" font-size="8">PRESSURE</text>

  <!-- ═══ SYZYGY LABELS ═══ -->
  <text x="452" y="140" fill="#22d3ee" font-size="8" font-weight="600" transform="rotate(30,452,140)">0::9</text>
  <text x="615" y="332" fill="#22d3ee" font-size="8" font-weight="600" transform="rotate(75,615,332)">1::8</text>
  <text x="470" y="502" fill="#22d3ee" font-size="8" font-weight="600">2::7</text>
  <text x="228" y="462" fill="#22d3ee" font-size="8" font-weight="600" transform="rotate(-75,228,462)">3::6</text>
  <text x="236" y="222" fill="#22d3ee" font-size="8" font-weight="600" transform="rotate(-30,236,222)">4::5</text>

  <!-- DECADENCE LABELS (midpoints of actual lines) -->
  <text x="560" y="230" fill="#fbbf24" font-size="7">1↔9</text>
  <text x="542" y="345" fill="#fbbf24" font-size="7">2↔8</text>
  <text x="330" y="500" fill="#fbbf24" font-size="7">3↔7</text>
  <text x="286" y="365" fill="#fbbf24" font-size="7">4↔6</text>

  <!-- ═══ CENTER ═══ -->
  <text x="400" y="325" fill="#475569" font-size="10" font-weight="600" text-anchor="middle">C(10,2)</text>
  <text x="400" y="342" fill="#475569" font-size="18" font-weight="700" text-anchor="middle">= 45</text>

  <!-- ═══ LEGEND (below diagram) ═══ -->
  <rect x="60" y="590" width="680" height="55" rx="6" fill="rgba(15,23,42,0.95)" stroke="#1e293b" stroke-width="1"/>
  <text x="75" y="608" fill="#94a3b8" font-size="9" font-weight="600">LEGEND</text>

  <circle cx="140" cy="605" r="6" fill="rgba(30,41,59,0.4)" stroke="#22d3ee" stroke-width="2"/>
  <text x="155" y="609" fill="#22d3ee" font-size="8">Outer (star point)</text>

  <circle cx="265" cy="605" r="5" fill="rgba(30,41,59,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="280" y="609" fill="#22d3ee" font-size="8">Inner (valley)</text>

  <line x1="360" y1="605" x2="385" y2="605" stroke="#22d3ee" stroke-width="2.5" stroke-opacity="0.8"/>
  <text x="395" y="609" fill="#22d3ee" font-size="8">Pentagram</text>

  <line x1="460" y1="605" x2="485" y2="605" stroke="#22d3ee" stroke-width="3" stroke-opacity="0.9"/>
  <text x="495" y="609" fill="#22d3ee" font-size="8">Syzygy (9)</text>

  <line x1="565" y1="605" x2="590" y2="605" stroke="#fbbf24" stroke-width="2" stroke-opacity="0.5"/>
  <text x="600" y="609" fill="#fbbf24" font-size="8">Decadence (10)</text>

  <text x="75" y="632" fill="#475569" font-size="7">Outer: 0,1,2,3,4 · Inner: 5,6,7,8,9 · Star: 0→2→4→1→3→0 · Syzygy spokes connect pairs · Decadence chords cross center · 45 total connections</text>

</svg>
